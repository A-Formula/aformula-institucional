
<style id="artigo-css">
.art-hero{position:relative;background:linear-gradient(135deg,var(--teal-900),var(--teal-700));padding:calc(72px + clamp(48px,8vw,86px)) 0 clamp(36px,6vw,60px);color:#fff}

.art-hero--img .art-hero__bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.art-hero--img .art-hero__scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(4,25,28,.28) 0%,rgba(4,25,28,.30) 42%,rgba(4,25,28,.86) 100%)}
.art-hero--img .container{position:relative;z-index:2;width:100%}

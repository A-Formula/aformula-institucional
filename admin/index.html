<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Painel · A Fórmula</title>
<link rel="icon" href="/index_assets/a1.webp">
<style>
  :root{
    --teal:#008896; --teal-d:#063237; --teal-700:#00525d; --ink:#16282b;
    --mut:#5c7075; --line:#e2e8e9; --bg:#f2f7f7; --white:#fff;
    --ok:#0a8f5b; --warn:#c67a12; --err:#c0392b;
    --sans:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:14.5px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit;font-size:14px}
  a{color:var(--teal)}
  .hidden{display:none!important}

  /* login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:34px;box-shadow:0 12px 40px rgba(6,50,55,.08)}
  #login .card{width:100%;max-width:380px}
  .brand{font-weight:800;font-size:20px;color:var(--teal-d);margin:0 0 4px}
  .brand span{color:var(--teal)}
  .sub{color:var(--mut);margin:0 0 24px;font-size:13px}
  label{display:block;font-weight:600;font-size:12.5px;margin:14px 0 6px;color:var(--teal-d)}
  .fld{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fbfdfd;outline:none}
  .fld:focus{border-color:var(--teal)}
  .btn{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-weight:700;font-size:14px}
  .btn:hover{background:var(--teal-700)} .btn:disabled{opacity:.5;cursor:default}
  .btn--ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
  .btn--ghost:hover{background:var(--teal);color:#fff}
  .btn--sm{padding:7px 13px;font-size:12.5px;border-radius:8px}
  .btn--danger{background:transparent;color:var(--err);border:1.5px solid var(--err)}
  .btn--danger:hover{background:var(--err);color:#fff}
  .msg{margin-top:14px;font-size:13px;min-height:18px}
  .msg.err{color:var(--err)} .msg.ok{color:var(--ok)}

  /* app shell */
  #app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  aside{background:var(--teal-d);color:#cfe3e5;padding:22px 16px;display:flex;flex-direction:column;gap:4px}
  aside .brand{color:#fff;font-size:18px;padding:0 8px 18px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:#bcd4d6;background:none;border:none;width:100%;text-align:left;font-size:14px;font-weight:600}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-item.active{background:var(--teal);color:#fff}
  .nav-item .badge{margin-left:auto;background:#fff;color:var(--teal-d);border-radius:999px;font-size:11px;font-weight:800;padding:1px 8px}
  aside .foot{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.12);font-size:12px}
  aside .foot .who{color:#9fc0c3;margin-bottom:10px;word-break:break-all}
  main{padding:30px 34px;overflow:auto;max-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}
  h1.page{margin:0;font-size:24px;color:var(--teal-d)}
  .hint{color:var(--mut);font-size:13px;margin:2px 0 0}

  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:top}
  th{background:#eef4f4;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--teal-700)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafcfc}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px}
  .tag.new{background:#fff2d6;color:#8a5a00} .tag.done{background:#d8f3e6;color:#0a6b45}
  .tag.pending{background:#fff2d6;color:#8a5a00} .tag.approved{background:#d8f3e6;color:#0a6b45} .tag.rejected{background:#f7dcd7;color:#a02b1a}
  .empty{padding:40px;text-align:center;color:var(--mut);background:#fff;border:1px dashed var(--line);border-radius:12px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar .search{flex:1;min-width:200px;max-width:340px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:1100px){.grid2{grid-template-columns:1fr}}
  @media(max-width:760px){#app{grid-template-columns:1fr}aside{flex-direction:row;flex-wrap:wrap;max-height:none}main{max-height:none}}
  textarea.fld{min-height:120px;resize:vertical;line-height:1.6}
  textarea.code{min-height:340px;font-family:ui-monospace,Consolas,monospace;font-size:13px}
  .row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:180px}
  .postrow-title{font-weight:600;color:var(--teal-d)}
  .modal-bg{position:fixed;inset:0;background:rgba(6,50,55,.5);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto;z-index:50}
  .modal{background:#fff;border-radius:16px;max-width:820px;width:100%;padding:28px}
  .modal h2{margin:0 0 18px;color:var(--teal-d)}
  .banner-note{background:#fff8e8;border:1px solid #f0dfb0;color:#7a5a12;border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:18px}
  .pubbar{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .pubbar .dot{width:9px;height:9px;border-radius:50%;background:var(--warn)}
  .pubbar.clean .dot{background:var(--ok)}
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login">
  <div class="card">
    <p class="brand">a <span>fórmula</span> · painel</p>
    <p class="sub">Acesso restrito à equipe.</p>
    <form id="loginForm">
      <label for="lg-email">E-mail</label>
      <input id="lg-email" class="fld" type="email" autocomplete="username" placeholder="voce@aformulabrasil.com.br">
      <label for="lg-pass">Senha</label>
      <input id="lg-pass" class="fld" type="password" autocomplete="current-password" placeholder="••••••••">
      <div style="margin-top:20px"><button class="btn" style="width:100%" type="submit">Entrar</button></div>
      <p id="lg-msg" class="msg"></p>
      <p style="margin-top:4px"><a href="#" id="lg-forgot" style="font-size:12.5px">Esqueci minha senha</a></p>
    </form>
  </div>
</section>

<!-- APP -->
<div id="app" class="hidden">
  <aside>
    <p class="brand">a fórmula</p>
    <button class="nav-item active" data-view="inbox">📥 Mensagens <span class="badge hidden" id="badge-inbox">0</span></button>
    <button class="nav-item" data-view="prescritores">🩺 Prescritores <span class="badge hidden" id="badge-presc">0</span></button>
    <button class="nav-item" data-view="newsletter">✉️ Newsletter</button>
    <button class="nav-item" data-view="posts">📝 Blog</button>
    <button class="nav-item" data-view="banner">🖼️ Banner da home</button>
    <button class="nav-item" data-view="settings">⚙️ Configurações</button>
    <div class="foot">
      <div class="who" id="who"></div>
      <button class="btn btn--ghost btn--sm" style="width:100%;color:#bcd4d6;border-color:rgba(255,255,255,.3)" id="logout">Sair</button>
    </div>
  </aside>
  <main>
    <div class="pubbar" id="pubbar">
      <span class="dot"></span>
      <div style="flex:1">
        <strong id="pub-title">Alterações são salvas na hora.</strong>
        <div class="hint" id="pub-hint">Editou banner, blog ou configurações? Clique em “Publicar no site” para o site no ar refletir as mudanças.</div>
      </div>
      <button class="btn" id="btn-publish">Publicar no site</button>
    </div>
    <div id="view"></div>
  </main>
</div>

<!-- Firebase compat (vendorizado, CSP-safe) -->
<script src="/admin/vendor/firebase-app-compat.js"></script>
<script src="/admin/vendor/firebase-auth-compat.js"></script>
<script src="/admin/vendor/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAeag91E__CL4f-4pRnKgezvwEasEUnUOY",
  authDomain: "aformula-institucional.firebaseapp.com",
  projectId: "aformula-institucional",
  appId: "1:139838701463:web:9938229ebeed4c545c8ed2"
});
const auth = firebase.auth();
const db = firebase.firestore();
const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function fmtTs(ts){ if(!ts) return '—'; const d=ts.toDate?ts.toDate():new Date(ts); return `${String(d.getDate()).padStart(2,'0')}/${MESES[d.getMonth()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

/* ---------- AUTH ---------- */
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault(); const m=$('#lg-msg'); m.className='msg'; m.textContent='Entrando…';
  try{ await auth.signInWithEmailAndPassword($('#lg-email').value.trim(), $('#lg-pass').value); }
  catch(err){ m.className='msg err'; m.textContent = err.code==='auth/invalid-credential'?'E-mail ou senha incorretos.':err.message; }
});
$('#lg-forgot').addEventListener('click', async e=>{
  e.preventDefault(); const em=$('#lg-email').value.trim(); const m=$('#lg-msg');
  if(!em){ m.className='msg err'; m.textContent='Digite seu e-mail acima primeiro.'; return; }
  try{ await auth.sendPasswordResetEmail(em); m.className='msg ok'; m.textContent='Enviamos um link de redefinição para seu e-mail.'; }
  catch(err){ m.className='msg err'; m.textContent=err.message; }
});
$('#logout').addEventListener('click', ()=>auth.signOut());

auth.onAuthStateChanged(async user=>{
  if(!user){ $('#login').classList.remove('hidden'); $('#app').classList.add('hidden'); return; }
  // confirma allowlist
  const ok = await db.collection('admins').doc(user.email).get().then(s=>s.exists).catch(()=>false);
  if(!ok){ $('#lg-msg').className='msg err'; $('#lg-msg').textContent='Este usuário não tem acesso ao painel.'; await auth.signOut(); return; }
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  $('#who').textContent = user.email;
  loadCounts(); router('inbox');
});

/* ---------- NAV ---------- */
document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); router(b.dataset.view);
}));
function router(v){ ({inbox:vInbox,prescritores:vPresc,newsletter:vNews,posts:vPosts,banner:vBanner,settings:vSettings}[v]||vInbox)(); }

async function loadCounts(){
  try{
    const c1 = await db.collection('contact_messages').where('status','==','new').get();
    const b1=$('#badge-inbox'); if(c1.size){b1.textContent=c1.size;b1.classList.remove('hidden');}else b1.classList.add('hidden');
    const c2 = await db.collection('prescribers').where('status','==','pending').get();
    const b2=$('#badge-presc'); if(c2.size){b2.textContent=c2.size;b2.classList.remove('hidden');}else b2.classList.add('hidden');
  }catch(e){}
}

/* ---------- INBOX (contatos) ---------- */
async function vInbox(){
  const v=$('#view'); v.innerHTML='<div class="topbar"><div><h1 class="page">Mensagens de contato</h1><p class="hint">Enviadas pelo formulário do site.</p></div></div><div id="rows">Carregando…</div>';
  const snap = await db.collection('contact_messages').orderBy('createdAt','desc').limit(200).get();
  if(snap.empty){ $('#rows').innerHTML='<div class="empty">Nenhuma mensagem ainda.</div>'; return; }
  let h='<table><thead><tr><th>Quando</th><th>Nome</th><th>Contato</th><th>Assunto</th><th>Mensagem</th><th>Status</th><th></th></tr></thead><tbody>';
  snap.forEach(d=>{ const m=d.data();
    h+=`<tr><td>${fmtTs(m.createdAt)}</td><td><strong>${esc(m.nome)}</strong></td>
    <td>${esc(m.email)}<br><span class="hint">${esc(m.telefone||'')}</span></td>
    <td>${esc(m.assunto)}</td><td style="max-width:280px">${esc(m.mensagem)}</td>
    <td><span class="tag ${m.status==='done'?'done':'new'}">${m.status==='done'?'resolvido':'novo'}</span></td>
    <td><button class="btn btn--ghost btn--sm" data-toggle="${d.id}" data-st="${m.status}">${m.status==='done'?'Reabrir':'Resolver'}</button></td></tr>`;
  });
  h+='</tbody></table>'; $('#rows').innerHTML=h;
  v.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click',async()=>{
    const ns = b.dataset.st==='done'?'new':'done';
    await db.collection('contact_messages').doc(b.dataset.toggle).update({status:ns});
    loadCounts(); vInbox();
  }));
}

/* ---------- PRESCRITORES ---------- */
async function vPresc(){
  const v=$('#view'); v.innerHTML='<div class="topbar"><div><h1 class="page">Cadastros de prescritores</h1><p class="hint">Aprove ou recuse o acesso à área exclusiva.</p></div></div><div id="rows">Carregando…</div>';
  const snap = await db.collection('prescribers').orderBy('createdAt','desc').limit(200).get();
  if(snap.empty){ $('#rows').innerHTML='<div class="empty">Nenhum cadastro ainda.</div>'; return; }
  let h='<table><thead><tr><th>Quando</th><th>Nome</th><th>CNPJ</th><th>Conselho</th><th>Contato</th><th>Status</th><th></th></tr></thead><tbody>';
  snap.forEach(d=>{ const m=d.data();
    h+=`<tr><td>${fmtTs(m.createdAt)}</td><td><strong>${esc(m.nome)}</strong><br><span class="hint">${esc(m.especialidade||'')}</span></td>
    <td>${esc(m.cnpj)}</td><td>${esc((m.conselho||'')+' '+(m.conselhoNumero||'')+(m.uf?'/'+m.uf:''))}</td>
    <td>${esc(m.email)}<br><span class="hint">${esc(m.telefone||'')}</span></td>
    <td><span class="tag ${m.status}">${esc(m.status)}</span></td>
    <td><button class="btn btn--ghost btn--sm" data-ap="${d.id}">Aprovar</button> <button class="btn btn--danger btn--sm" data-rj="${d.id}">Recusar</button></td></tr>`;
  });
  h+='</tbody></table>'; $('#rows').innerHTML=h;
  v.querySelectorAll('[data-ap]').forEach(b=>b.addEventListener('click',async()=>{await db.collection('prescribers').doc(b.dataset.ap).update({status:'approved'});loadCounts();vPresc();}));
  v.querySelectorAll('[data-rj]').forEach(b=>b.addEventListener('click',async()=>{await db.collection('prescribers').doc(b.dataset.rj).update({status:'rejected'});loadCounts();vPresc();}));
}

/* ---------- NEWSLETTER ---------- */
async function vNews(){
  const v=$('#view'); v.innerHTML='<div class="topbar"><div><h1 class="page">Inscritos na newsletter</h1><p class="hint" id="ncount"></p></div><button class="btn" id="csv">Exportar CSV</button></div><div id="rows">Carregando…</div>';
  const snap = await db.collection('newsletter').orderBy('createdAt','desc').limit(1000).get();
  $('#ncount').textContent = `${snap.size} inscrito(s).`;
  if(snap.empty){ $('#rows').innerHTML='<div class="empty">Nenhum inscrito ainda.</div>'; }
  else{
    let h='<table><thead><tr><th>Quando</th><th>E-mail</th><th>Origem</th></tr></thead><tbody>';
    const rows=[['email','origem','data']];
    snap.forEach(d=>{const m=d.data(); h+=`<tr><td>${fmtTs(m.createdAt)}</td><td>${esc(m.email)}</td><td>${esc(m.source||'')}</td></tr>`; rows.push([m.email,m.source||'',fmtTs(m.createdAt)]);});
    h+='</tbody></table>'; $('#rows').innerHTML=h;
    $('#csv').addEventListener('click',()=>{
      const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
      const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='newsletter-aformula.csv'; a.click();
    });
  }
}

/* ---------- POSTS ---------- */
let CATS=[];
async function vPosts(){
  const v=$('#view'); v.innerHTML='<div class="topbar"><div><h1 class="page">Blog</h1><p class="hint">Edite, crie ou remova matérias. Depois clique em “Publicar no site”.</p></div><button class="btn" id="new">+ Nova matéria</button></div><div class="toolbar"><input class="fld search" id="q" placeholder="Buscar por título…"></div><div id="rows">Carregando…</div>';
  if(!CATS.length){ const cs=await db.collection('categories').orderBy('order').get(); CATS=cs.docs.map(d=>({slug:d.id,...d.data()})); }
  const snap = await db.collection('posts').get();
  const posts = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.publishedAt||'').localeCompare(a.publishedAt||''));
  function render(list){
    if(!list.length){ $('#rows').innerHTML='<div class="empty">Nenhuma matéria.</div>'; return; }
    let h='<table><thead><tr><th>Publicado</th><th>Título</th><th>Categoria</th><th></th><th></th></tr></thead><tbody>';
    list.forEach(p=>{ h+=`<tr><td>${(p.publishedAt||'').slice(0,10)}</td><td class="postrow-title">${esc(p.title)}</td><td>${esc(p.categoryLabel||p.categorySlug)}</td>
      <td><button class="btn btn--ghost btn--sm" data-edit="${p.id}">Editar</button></td>
      <td><button class="btn btn--danger btn--sm" data-del="${p.id}">Excluir</button></td></tr>`; });
    h+='</tbody></table>'; $('#rows').innerHTML=h;
    v.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>editPost(posts.find(p=>p.id===b.dataset.edit))));
    v.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{
      const p=posts.find(x=>x.id===b.dataset.del);
      if(confirm(`Excluir a matéria “${p.title}”? Isso remove do site na próxima publicação.`)){ await db.collection('posts').doc(p.id).delete(); vPosts(); }
    }));
  }
  render(posts);
  $('#q').addEventListener('input',e=>{const q=e.target.value.toLowerCase();render(posts.filter(p=>(p.title||'').toLowerCase().includes(q)));});
  $('#new').addEventListener('click',()=>editPost(null));
}
function slugify(s){return s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,80);}
function editPost(p){
  const isNew=!p; p=p||{categorySlug:'saude',status:'published',author:'A Fórmula',readTime:4};
  const catOpts=CATS.map(c=>`<option value="${c.slug}" ${c.slug===p.categorySlug?'selected':''}>${esc(c.label)}</option>`).join('');
  const bg=document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML=`<div class="modal"><h2>${isNew?'Nova matéria':'Editar matéria'}</h2>
    <label>Título</label><input class="fld" id="e-title" value="${esc(p.title||'')}">
    <div class="row"><div><label>Categoria</label><select class="fld" id="e-cat">${catOpts}</select></div>
    <div><label>Tempo de leitura (min)</label><input class="fld" id="e-read" type="number" value="${p.readTime||4}"></div>
    <div><label>Data (AAAA-MM-DD)</label><input class="fld" id="e-date" value="${(p.publishedAt||new Date().toISOString()).slice(0,10)}"></div></div>
    <label>Resumo (aparece nos cards e no Google)</label><textarea class="fld" id="e-exc">${esc(p.excerpt||'')}</textarea>
    <label>Imagem de capa (URL)</label><input class="fld" id="e-cover" value="${esc(p.cover||'')}" placeholder="/blog_assets/wp/arquivo.webp">
    <label>Conteúdo (HTML — use &lt;h2&gt;, &lt;p&gt;, &lt;ul&gt;&lt;li&gt;, &lt;strong&gt;)</label>
    <textarea class="fld code" id="e-body">${esc(p.contentHTML||'<p></p>')}</textarea>
    <p class="msg" id="e-msg"></p>
    <div class="row" style="margin-top:14px"><button class="btn" id="e-save" style="flex:0">Salvar</button><button class="btn btn--ghost" id="e-cancel" style="flex:0">Cancelar</button></div>
  </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#e-cancel').addEventListener('click',()=>bg.remove());
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
  bg.querySelector('#e-save').addEventListener('click',async()=>{
    const title=bg.querySelector('#e-title').value.trim(); const m=bg.querySelector('#e-msg');
    if(!title){m.className='msg err';m.textContent='Título é obrigatório.';return;}
    const catSlug=bg.querySelector('#e-cat').value; const cat=CATS.find(c=>c.slug===catSlug)||{};
    const slug = p.id || slugify(title);
    const date = bg.querySelector('#e-date').value + 'T10:00:00';
    const doc={
      slug, path:`/blog/${catSlug}/${slug}`, title,
      excerpt:bg.querySelector('#e-exc').value.trim(),
      contentHTML:bg.querySelector('#e-body').value,
      categorySlug:catSlug, categoryLabel:cat.label||catSlug,
      author:p.author||'A Fórmula', publishedAt:p.publishedAt||date, modifiedAt:date,
      readTime:parseInt(bg.querySelector('#e-read').value)||4,
      cover:bg.querySelector('#e-cover').value.trim()||null, coverAlt:p.coverAlt||title,
      status:'published', wpId:p.wpId||0,
    };
    m.className='msg';m.textContent='Salvando…';
    await db.collection('posts').doc(slug).set(doc,{merge:true});
    bg.remove(); vPosts();
  });
}

/* ---------- BANNER ---------- */
async function vBanner(){
  const v=$('#view'); v.innerHTML='<div class="topbar"><div><h1 class="page">Banner da home</h1><p class="hint">Texto do topo da página inicial.</p></div></div><div class="card" style="max-width:640px" id="bx">Carregando…</div>';
  const d=await db.collection('banners').doc('home-hero').get(); const b=d.data()||{};
  $('#bx').innerHTML=`<label>Título principal</label><input class="fld" id="b-h" value="${esc(b.headline||'')}">
    <label>Subtítulo</label><input class="fld" id="b-l" value="${esc(b.lead||'')}">
    <label>Texto de apoio</label><textarea class="fld" id="b-b">${esc(b.body||'')}</textarea>
    <p class="msg" id="b-msg"></p>
    <div style="margin-top:14px"><button class="btn" id="b-save">Salvar</button></div>`;
  $('#b-save').addEventListener('click',async()=>{
    const m=$('#b-msg');m.className='msg';m.textContent='Salvando…';
    await db.collection('banners').doc('home-hero').set({headline:$('#b-h').value,lead:$('#b-l').value,body:$('#b-b').value,active:true},{merge:true});
    m.className='msg ok';m.textContent='Salvo. Clique em “Publicar no site” para aplicar.';
  });
}

/* ---------- SETTINGS ---------- */
async function vSettings(){
  const v=$('#view'); v.innerHTML='<div class="topbar"><div><h1 class="page">Configurações</h1><p class="hint">Dados globais usados no site inteiro.</p></div></div><div class="card" style="max-width:720px" id="sx">Carregando…</div>';
  const d=await db.collection('settings').doc('global').get(); const s=d.data()||{};
  const f=(k,l,ph)=>`<div><label>${l}</label><input class="fld" id="s-${k}" value="${esc(s[k]||'')}"${ph?` placeholder="${ph}"`:''}></div>`;
  $('#sx').innerHTML=`<div class="row">${f('years','Anos de história','ex.: 38 (só o número)')}${f('notifyEmail','E-mail p/ notificações','nome@dominio.com.br')}</div>
    <div class="row">${f('sacEmail','E-mail SAC','sac@aformulabr.com.br')}${f('petEmail','E-mail Pet','pet@aformulabr.com.br')}</div>
    ${f('franchiseUrl','URL Seja franqueado','https://…')}
    <div class="row">${f('instagram','Instagram (URL completa)','https://www.instagram.com/…')}${f('facebook','Facebook (URL completa)','https://www.facebook.com/…')}</div>
    <div class="row">${f('youtube','YouTube (URL completa)','https://www.youtube.com/@…')}${f('linkedin','LinkedIn (URL completa)','https://www.linkedin.com/company/…')}</div>
    <p class="hint" style="margin-top:10px">Campo vazio ou em formato inválido é ignorado na publicação — o site mantém o valor atual.</p>
    <p class="msg" id="s-msg"></p><div style="margin-top:14px"><button class="btn" id="s-save">Salvar</button></div>`;
  $('#s-save').addEventListener('click',async()=>{
    const keys=['years','notifyEmail','sacEmail','petEmail','franchiseUrl','instagram','facebook','youtube','linkedin'];
    const upd={}; keys.forEach(k=>{let val=$('#s-'+k).value; if(k==='years')val=parseInt(val)||val; upd[k]=val;});
    const m=$('#s-msg');m.className='msg';m.textContent='Salvando…';
    await db.collection('settings').doc('global').set(upd,{merge:true});
    m.className='msg ok';m.textContent='Salvo.';
  });
}

/* ---------- PUBLICAR ---------- */
$('#btn-publish').addEventListener('click',async()=>{
  const btn=$('#btn-publish'), pb=$('#pubbar'), t=$('#pub-title'), hint=$('#pub-hint');
  btn.disabled=true; t.textContent='Publicando…'; hint.textContent='Isso leva 1–2 minutos. Pode continuar usando o painel.';
  try{
    const token = await auth.currentUser.getIdToken();
    const r = await fetch('/api/publish',{method:'POST',headers:{Authorization:'Bearer '+token}});
    if(!r.ok) throw new Error('falha');
    pb.classList.add('clean'); t.textContent='Publicação iniciada ✓'; hint.textContent='O site no ar reflete as mudanças em 1–2 minutos.';
  }catch(e){ t.textContent='Não foi possível publicar.'; hint.textContent='Tente de novo; se persistir, avise o suporte técnico.'; }
  finally{ btn.disabled=false; }
});
</script>
</body>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Painel · A Fórmula</title>
<link rel="icon" href="/index_assets/a1.webp">
<style>
  :root{
    --teal:#008896; --teal-d:#063237; --teal-700:#00525d; --ink:#16282b;
    --mut:#5c7075; --line:#e2e8e9; --bg:#f2f7f7; --white:#fff;
    --ok:#0a8f5b; --warn:#c67a12; --err:#c0392b;
    --sans:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:14.5px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit;font-size:14px}
  a{color:var(--teal)}
  .hidden{display:none!important}

  /* login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:34px;box-shadow:0 12px 40px rgba(6,50,55,.08)}
  #login .card{width:100%;max-width:380px}
  .brand{font-weight:800;font-size:20px;color:var(--teal-d);margin:0 0 4px}
  .brand span{color:var(--teal)}
  .sub{color:var(--mut);margin:0 0 24px;font-size:13px}
  label{display:block;font-weight:600;font-size:12.5px;margin:14px 0 6px;color:var(--teal-d)}
  .fld{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fbfdfd;outline:none}
  .fld:focus{border-color:var(--teal)}
  .btn{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-weight:700;font-size:14px}
  .btn:hover{background:var(--teal-700)} .btn:disabled{opacity:.5;cursor:default}
  .btn--ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
  .btn--ghost:hover{background:var(--teal);color:#fff}
  .btn--sm{padding:7px 13px;font-size:12.5px;border-radius:8px}
  .btn--danger{background:transparent;color:var(--err);border:1.5px solid var(--err)}
  .btn--danger:hover{background:var(--err);color:#fff}
  .msg{margin-top:14px;font-size:13px;min-height:18px}
  .msg.err{color:var(--err)} .msg.ok{color:var(--ok)}

  /* app shell */
  #app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  aside{background:var(--teal-d);color:#cfe3e5;padding:22px 16px;display:flex;flex-direction:column;gap:4px}
  aside .brand{color:#fff;font-size:18px;padding:0 8px 18px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:#bcd4d6;background:none;border:none;width:100%;text-align:left;font-size:14px;font-weight:600}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-item.active{background:var(--teal);color:#fff}
  .nav-item .badge{margin-left:auto;background:#fff;color:var(--teal-d);border-radius:999px;font-size:11px;font-weight:800;padding:1px 8px}
  aside .foot{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.12);font-size:12px}
  aside .foot .who{color:#9fc0c3;margin-bottom:10px;word-break:break-all}
  main{padding:30px 34px;overflow:auto;max-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}
  h1.page{margin:0;font-size:24px;color:var(--teal-d)}
  .hint{color:var(--mut);font-size:13px;margin:2px 0 0}

  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:top}
  th{background:#eef4f4;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--teal-700)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafcfc}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px}
  .tag.new{background:#fff2d6;color:#8a5a00} .tag.done{background:#d8f3e6;color:#0a6b45}
  .tag.pending{background:#fff2d6;color:#8a5a00} .tag.approved{background:#d8f3e6;color:#0a6b45} .tag.rejected{background:#f7dcd7;color:#a02b1a}
  .empty{padding:40px;text-align:center;color:var(--mut);background:#fff;border:1px dashed var(--line);border-radius:12px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar .search{flex:1;min-width:200px;max-width:340px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:1100px){.grid2{grid-template-columns:1fr}}
  @media(max-width:760px){#app{grid-template-columns:1fr}aside{flex-direction:row;flex-wrap:wrap;max-height:none}main{max-height:none}}
  textarea.fld{min-height:120px;resize:vertical;line-height:1.6}
  textarea.code{min-height:340px;font-family:ui-monospace,Consolas,monospace;font-size:13px}
  .row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:180px}
  .postrow-title{font-weight:600;color:var(--teal-d)}
  .modal-bg{position:fixed;inset:0;background:rgba(6,50,55,.5);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto;z-index:50}
  .modal{background:#fff;border-radius:16px;max-width:820px;width:100%;padding:28px}
  .modal h2{margin:0 0 18px;color:var(--teal-d)}
  .banner-note{background:#fff8e8;border:1px solid #f0dfb0;color:#7a5a12;border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:18px}
  .pubbar{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .pubbar .dot{width:9px;height:9px;border-radius:50%;background:var(--warn)}
  .pubbar.clean .dot{background:var(--ok)}
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login">
  <div class="card">
    <p class="brand">a <span>fórmula</span> · painel</p>

<!-- APP -->
<div id="app" class="hidden">
  <aside>
    <p class="brand">a fórmula</p>
    <button class="nav-item active" data-view="inbox">📥 Mensagens <span class="badge hidden" id="badge-inbox">0</span></button>
    <button class="nav-item" data-view="prescritores">🩺 Prescritores <span class="badge hidden" id="badge-presc">0</span></button>

      </div>
      <button class="btn" id="btn-publish">Publicar no site</button>

    <div id="view"></div>

</div>

<!-- Firebase compat (vendorizado, CSP-safe) -->
<script src="/admin/vendor/firebase-app-compat.js"></script>
<script src="/admin/vendor/firebase-auth-compat.js"></script>
<script src="/admin/vendor/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAeag91E__CL4f-4pRnKgezvwEasEUnUOY",
  authDomain: "aformula-institucional.firebaseapp.com",
  projectId: "aformula-institucional",
  appId: "1:139838701463:web:9938229ebeed4c545c8ed2"
});
const auth = firebase.auth();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(err=>{ // sessão persiste entre reloads/abas
  // Opera GX e navegadores com anti-fingerprint podem bloquear IndexedDB → persistência falha silenciosa.
  try{ localStorage.setItem('cmsx_persist_err', JSON.stringify({code:(err&&err.code)||'', msg:(err&&err.message)||'', at:new Date().toISOString()})); }catch(_){}
});
const db = firebase.firestore();
const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function fmtTs(ts){ if(!ts) return '—'; const d=ts.toDate?ts.toDate():new Date(ts); return `${String(d.getDate()).padStart(2,'0')}/${MESES[d.getMonth()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
// Data completa (com ano) p/ exports CSV — evita ambiguidade entre anos.
function fmtTsCSV(ts){ if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
// Neutraliza fórmulas em CSV (Excel executa células que começam com = + - @) — segurança do export.
const csvSafe = v => { const s=(v==null?'':String(v)); return /^[=+\-@\t\r]/.test(s) ? "'"+s : s; };

/* ---------- DIAGNÓSTICO (versão no ar + motivo do último logout) ---------- */
const CMSX_VER='2026-07-20-e';
let cmsxWasIn=false, cmsxHandled=false, cmsxLastEmail='';   // cmsxHandled = o logout foi causado por nós (Sair ou negação)
const CMSX_REASONS={ 'clicou-sair':'você clicou em Sair', 'nao-admin':'conta sem acesso (fora da allowlist)', 'firebase-encerrou':'a sessão do Firebase encerrou sozinha (token/segurança)', 'sessao-nao-restaurada':'a sessão não foi restaurada ao reabrir (armazenamento do navegador bloqueado?)' };
function cmsxNote(reason){ try{ localStorage.setItem('cmsx_logout', JSON.stringify({reason, at:new Date().toISOString(), email:(auth.currentUser&&auth.currentUser.email)||cmsxLastEmail||''})); }catch(_){} }
function cmsxDiag(){
  const el=$('#lg-diag'); if(!el) return;
  let s='Painel v'+CMSX_VER;
  try{ const j=JSON.parse(localStorage.getItem('cmsx_logout')||'null');
    if(j){ const w=new Date(j.at), hh=String(w.getHours()).padStart(2,'0')+':'+String(w.getMinutes()).padStart(2,'0');
      s+=' · último logout '+hh+': '+(CMSX_REASONS[j.reason]||j.reason)+(j.email?(' ('+j.email+')'):''); } }catch(_){}
  try{ const p=JSON.parse(localStorage.getItem('cmsx_persist_err')||'null'); if(p) s+=' · ⚠ armazenamento seguro bloqueado ('+(p.code||p.msg||'erro')+')'; }catch(_){}
  el.textContent=s;
}
cmsxDiag();

/* ---------- AUTH ---------- */
const LOGIN_MSGS={'auth/invalid-credential':'E-mail ou senha incorretos.','auth/wrong-password':'E-mail ou senha incorretos.','auth/user-not-found':'E-mail ou senha incorretos.','auth/invalid-email':'E-mail em formato inválido.','auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos e tente de novo.','auth/network-request-failed':'Falha de rede — verifique sua conexão ou o bloqueio de rastreadores do navegador.','auth/user-disabled':'Esta conta foi desativada.'};
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault(); const m=$('#lg-msg'); m.className='msg'; m.textContent='Entrando…';
  try{ await auth.signInWithEmailAndPassword($('#lg-email').value.trim(), $('#lg-pass').value); }
  catch(err){ m.className='msg err'; m.textContent = LOGIN_MSGS[err.code] || err.message; }
});
$('#lg-forgot').addEventListener('click', async e=>{
  e.preventDefault(); const em=$('#lg-email').value.trim(); const m=$('#lg-msg');
  if(!em){ m.className='msg err'; m.textContent='Digite seu e-mail acima primeiro.'; return; }
  const okMsg='Se esse e-mail tiver acesso ao painel, enviamos um link de redefinição.';
  try{ await auth.sendPasswordResetEmail(em); m.className='msg ok'; m.textContent=okMsg; }
  catch(err){
    // user-not-found parece sucesso (anti-enumeração); erros reais (rede, formato, rate-limit) aparecem.
    if(err.code==='auth/user-not-found'){ m.className='msg ok'; m.textContent=okMsg; }
    else { m.className='msg err'; m.textContent = LOGIN_MSGS[err.code] || err.message; }
  }
});
$('#logout').addEventListener('click', ()=>{ cmsxHandled=true; cmsxNote('clicou-sair'); auth.signOut(); });

// Gate no cliente é só UX — o gate REAL é o servidor (verifyAdmin) + as regras do Firestore.
// Por isso NUNCA deslogamos por erro transitório (rede, refresh de token, signOut de outra aba):
// só deslogamos se a leitura teve SUCESSO e o doc de admin não existe (negação definitiva).
auth.onAuthStateChanged(async user=>{
  if(!user){
    if(cmsxWasIn && !cmsxHandled) cmsxNote('firebase-encerrou'); // não fomos nós → o Firebase encerrou a sessão (na mesma aba)
    else if(!cmsxWasIn && !cmsxHandled){ // página nova: havia sessão gravada e não restaurou? (bug clássico Opera GX)
      try{ if(localStorage.getItem('cmsx_hadSession')==='1') cmsxNote('sessao-nao-restaurada'); }catch(_){}
    }
    cmsxWasIn=false; cmsxHandled=false;
    try{ localStorage.removeItem('cmsx_hadSession'); }catch(_){}
    $('#login').classList.remove('hidden'); $('#app').classList.add('hidden'); cmsxDiag(); return;
  }
  cmsxWasIn=true; cmsxLastEmail=user.email;
  try{ localStorage.setItem('cmsx_hadSession','1'); }catch(_){}
  // Confirma a allowlist ANTES de mostrar o painel: evita flash da UI privilegiada e leituras negadas
  // (o e-mail é normalizado p/ minúsculas — bate com o doc admins/{email} e com o verifyAdmin do servidor).
  let allowed=true;
  try{ allowed = (await db.collection('admins').doc((user.email||'').toLowerCase()).get()).exists; }
  catch(_){ allowed=true; /* erro transitório: mantém logado — o servidor barra quem não é admin */ }
  if(!allowed){
    cmsxNote('nao-admin'); cmsxHandled=true;
    $('#app').classList.add('hidden'); $('#login').classList.remove('hidden');
    const m=$('#lg-msg'); m.className='msg err'; m.textContent='Este usuário não tem acesso ao painel.';
    await auth.signOut(); return;
  }
  $('#lg-msg').textContent='';
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  $('#who').textContent = user.email;
  loadCounts(); router('inbox');
});

/* ---------- NAV ---------- */
document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); router(b.dataset.view);
}));
function router(v){ ({inbox:vInbox,prescritores:vPresc,career:vCareer,newsletter:vNews,preContent:vPreContent,settings:vSettings}[v]||vInbox)(); }

/* Upload de mídia (Vercel Blob via /api/upload, gated por admin) — usado pelo Conteúdo do prescritor (PDF) */
async function uploadFile(file){
  if(file.size>4*1024*1024) throw new Error('Arquivo acima de 4 MB — reduza antes de enviar.');
  if(!auth.currentUser) throw new Error('Sessão expirou. Recarregue a página e entre de novo.');
  const token=await auth.currentUser.getIdToken();
  const r=await fetch('/api/upload?filename='+encodeURIComponent(file.name)+'&type='+encodeURIComponent(file.type||'application/octet-stream'),
    {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/octet-stream'},body:file});
  const j=await r.json().catch(()=>({}));
  if(!j.ok) throw new Error(j.error==='type'?'Formato não permitido (use imagem ou PDF).':'Falha no upload — tente de novo.');
  return j.url;
}

async function adminDelete(collection, id){
  if(!auth.currentUser){ alert('Sessão expirou. Recarregue a página e entre de novo.'); return false; }
  try{
    const token=await auth.currentUser.getIdToken();
    const r=await fetch('/api/admin-delete',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({collection,id})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return true;
  }catch(e){ alert('Não foi possível excluir: '+e.message); return false; }
}

async function loadCounts(){
  try{
    const c1 = await db.collection('contact_messages').where('status','==','new').get();
    const b1=$('#badge-inbox'); if(c1.size){b1.textContent=c1.size;b1.classList.remove('hidden');}else b1.classList.add('hidden');
    const c2 = await db.collection('prescribers').where('status','==','pending').get();
    const b2=$('#badge-presc'); if(c2.size){b2.textContent=c2.size;b2.classList.remove('hidden');}else b2.classList.add('hidden');
    const c3 = await db.collection('career_applications').where('status','==','new').get();
    const b3=$('#badge-career'); if(b3){if(c3.size){b3.textContent=c3.size;b3.classList.remove('hidden');}else b3.classList.add('hidden');}
  }catch(e){ console.error('loadCounts', e); }
}

/* ---------- INBOX (contatos) ---------- */
async function vInbox(){
  const v=$('#view');
  v.innerHTML=`<div class="topbar"><div><h1 class="page">Mensagens de contato</h1><p class="hint" id="i-count"></p></div><button class="btn" id="i-csv">⬇ Exportar CSV</button></div>
  <div class="toolbar">
    <select class="fld" id="if-status" style="max-width:160px"><option value="">Status: todos</option><option value="new">Novos</option><option value="done">Resolvidos</option></select>
    <select class="fld" id="if-assunto" style="max-width:230px"><option value="">Assunto: todos</option></select>
    <select class="fld" id="if-mkt" style="max-width:180px"><option value="">Marketing: todos</option><option value="1">Aceita</option><option value="0">Não aceita</option></select>
    <input class="fld search" id="if-q" placeholder="Buscar nome, e-mail, mensagem…">
    <button class="btn btn--ghost btn--sm" id="if-clear">Limpar</button>
  </div><div id="rows">Carregando…</div>`;
  let snap;
  try{ snap = await db.collection('contact_messages').orderBy('createdAt','desc').limit(500).get(); }
  catch(e){ $('#rows').innerHTML='<div class="empty">Não foi possível carregar as mensagens. Recarregue a página.</div>'; return; }
  if(snap.empty){ $('#i-count').textContent='Nenhuma mensagem ainda.'; $('#rows').innerHTML='<div class="empty">Nenhuma mensagem ainda.</div>'; return; }
  const all = snap.docs.map(d=>({id:d.id,...d.data()}));
  const fill=(sel,vals)=>{const s=$(sel);[...new Set(vals.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt')).forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;s.appendChild(o);});};
  fill('#if-assunto',all.map(m=>m.assunto));
  let current=all;
  function apply(){
    const st=$('#if-status').value, as=$('#if-assunto').value, mk=$('#if-mkt').value, q=$('#if-q').value.trim().toLowerCase();
    current=all.filter(m=>(!st||(m.status||'new')===st)&&(!as||m.assunto===as)
      &&(mk===''||(mk==='1'?!!m.marketing:!m.marketing))
      &&(!q||[m.nome,m.email,m.telefone,m.mensagem,m.cep].some(x=>String(x||'').toLowerCase().includes(q))));
    const nNew=all.filter(m=>(m.status||'new')==='new').length;
    $('#i-count').textContent=`${current.length} de ${all.length} mensagem(ns) · ${nNew} nova(s).`;
    render(current);
  }
  function render(list){
    if(!list.length){ $('#rows').innerHTML='<div class="empty">Nenhuma mensagem com esses filtros.</div>'; return; }
    let h='<table><thead><tr><th>Quando</th><th>Nome</th><th>Contato</th><th>Assunto</th><th>Mensagem</th><th>Mkt</th><th>Status</th><th></th></tr></thead><tbody>';
    list.forEach(m=>{ const stt=(m.status||'new');
      h+=`<tr><td>${fmtTs(m.createdAt)}</td><td><strong>${esc(m.nome)}</strong></td>
      <td>${esc(m.email)}<br><span class="hint">${esc(m.telefone||'')}${m.cep?' · CEP '+esc(m.cep):''}</span></td>
      <td>${esc(m.assunto)}</td><td style="max-width:260px">${esc(m.mensagem)}</td>
      <td>${m.marketing?'<span class="tag done">✓</span>':'<span class="hint">—</span>'}</td>
      <td><span class="tag tag--status ${stt==='done'?'done':'new'}">${stt==='done'?'resolvido':'novo'}</span></td>
      <td><button class="btn btn--ghost btn--sm" data-toggle="${m.id}" data-st="${stt}">${stt==='done'?'Reabrir':'Resolver'}</button> <button class="btn btn--danger btn--sm" data-del="${m.id}">Apagar</button></td></tr>`;
    });
    h+='</tbody></table>'; $('#rows').innerHTML=h;
    $('#rows').querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click',async()=>{

    <select class="fld" id="f-uf" style="max-width:120px"><option value="">UF: todas</option></select>
    <select class="fld" id="f-cidade" style="max-width:200px"><option value="">Cidade: todas</option></select>

    <button class="btn btn--ghost btn--sm" id="f-clear">Limpar</button>
  </div><div id="rows">Carregando…</div>`;
  let snap;
  try{ snap = await db.collection('prescribers').orderBy('createdAt','desc').limit(1000).get(); }
  catch(e){ $('#rows').innerHTML='<div class="empty">Não foi possível carregar os cadastros. Recarregue a página.</div>'; return; }
  const all = snap.docs.map(d=>({id:d.id,...d.data()}));
  const fill=(sel,vals)=>{const s=$(sel);[...new Set(vals.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt')).forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;s.appendChild(o);});};
  fill('#f-esp',all.map(m=>m.especialidade)); fill('#f-uf',all.map(m=>m.uf)); fill('#f-cidade',all.map(m=>m.cidade));
  let current=all;
  function apply(){
    const st=$('#f-status').value, ep=$('#f-esp').value, uf=$('#f-uf').value, ci=$('#f-cidade').value;
    const q=$('#f-q').value.trim().toLowerCase();
    current=all.filter(m=>(!st||m.status===st)&&(!ep||m.especialidade===ep)&&(!uf||m.uf===uf)&&(!ci||m.cidade===ci)
      &&(!q||[m.nome,m.email,m.telefone,m.cidade,m.conselhoNumero].some(x=>String(x||'').toLowerCase().includes(q))));
    const n={pending:0,approved:0,rejected:0}; all.forEach(m=>{if(n[m.status]!=null)n[m.status]++;});
    $('#p-count').textContent=`${current.length} de ${all.length} cadastro(s) · ${n.pending} pendente(s), ${n.approved} aprovado(s), ${n.rejected} recusado(s).`;
    render(current);
  }
  function render(list){
    if(!list.length){ $('#rows').innerHTML='<div class="empty">Nenhum cadastro com esses filtros.</div>'; return; }
    let h='<table><thead><tr><th>Quando</th><th>Nome</th><th>Conselho</th><th>Cidade/UF</th><th>Contato</th><th>Status</th><th></th></tr></thead><tbody>';
    list.forEach(m=>{
      h+=`<tr><td>${fmtTs(m.createdAt)}</td><td><strong>${esc(m.nome)}</strong><br><span class="hint">${esc(m.especialidade||'')}</span></td>
      <td>${esc((m.conselho||'')+' '+(m.conselhoNumero||'')+(m.uf?'/'+m.uf:''))}</td>
      <td>${esc(m.cidade||'—')}${m.uf?'/'+esc(m.uf):''}</td>
      <td>${esc(m.email)}<br><span class="hint">${esc(m.telefone||'')}</span></td>
      <td><span class="tag ${m.status}">${ST_LABEL[m.status]||esc(m.status)}</span></td>
      <td>${m.status==='approved'
        ?`<button class="btn btn--danger btn--sm" data-rj="${m.id}">Revogar</button>`
        :`<button class="btn btn--ghost btn--sm" data-ap="${m.id}">Aprovar</button> <button class="btn btn--danger btn--sm" data-rj="${m.id}">Recusar</button>`}</td></tr>`;
    });
    h+='</tbody></table>'; $('#rows').innerHTML=h;
    wire();
  }
  ['#f-status','#f-esp','#f-uf','#f-cidade'].forEach(s=>$(s).addEventListener('change',apply));
  $('#f-q').addEventListener('input',apply);
  $('#f-clear').addEventListener('click',()=>{['#f-status','#f-esp','#f-uf','#f-cidade','#f-q'].forEach(s=>$(s).value='');apply();});
  $('#p-csv').addEventListener('click',()=>{
    const rows=[['data','nome','email','telefone','conselho','registro','uf','cidade','especialidade','cnpj','status']];
    current.forEach(m=>rows.push([fmtTsCSV(m.createdAt),m.nome,m.email,m.telefone||'',m.conselho||'',m.conselhoNumero||'',m.uf||'',m.cidade||'',m.especialidade||'',m.cnpj||'',ST_LABEL[m.status]||m.status]));
    const csv='﻿'+rows.map(r=>r.map(c=>`"${csvSafe(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'})); a.download='prescritores-aformula.csv'; a.click();
  });
  function wire(){
  async function decide(id, action, btn){
    if(!auth.currentUser){ alert('Sessão expirou. Recarregue a página e entre de novo.'); return; }
    // Trava OS DOIS botões da linha (Aprovar + Recusar) — evita disparar aprovar e recusar em corrida.
    const row=btn.closest('tr'), rowBtns=row?[...row.querySelectorAll('button')]:[btn];
    rowBtns.forEach(b=>b.disabled=true); btn.textContent='…';
    try{
      const token=await auth.currentUser.getIdToken();
      const r=await fetch('/api/prescritor-decide',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({id,action})});
      const j=await r.json();
      if(!j.ok) throw new Error(j.error||'falha');
      if(action==='approve'){
        const bg=document.createElement('div'); bg.className='modal-bg';
        bg.innerHTML=`<div class="modal"><h2>Prescritor aprovado ✓</h2>
          <p>${j.emailSent?'O prescritor recebeu um e-mail com o link para criar a senha.':'<strong>O e-mail automático não pôde ser enviado</strong> (domínio ainda não verificado no Resend). Envie o link abaixo por WhatsApp ou e-mail:'}</p>
          <label>Link para o prescritor definir a senha (válido por tempo limitado)</label>
          <input class="fld" id="rl" readonly value="${esc(j.resetLink)}">
          <div class="row" style="margin-top:14px"><button class="btn" id="rl-copy" style="flex:0">Copiar link</button><button class="btn btn--ghost" id="rl-close" style="flex:0">Fechar</button></div>
        </div>`;
        document.body.appendChild(bg);
        bg.querySelector('#rl-copy').addEventListener('click',async()=>{
          const link=bg.querySelector('#rl').value;
          try{ await navigator.clipboard.writeText(link); }
          catch(_){ bg.querySelector('#rl').select(); try{document.execCommand('copy');}catch(__){} }
          bg.querySelector('#rl-copy').textContent='Copiado ✓';
        });
        bg.querySelector('#rl-close').addEventListener('click',()=>{bg.remove();loadCounts();vPresc();});
      } else { loadCounts(); vPresc(); }
    }catch(e){ alert('Não foi possível concluir: '+e.message); loadCounts(); vPresc(); }
  }
  v.querySelectorAll('[data-ap]').forEach(b=>b.addEventListener('click',()=>decide(b.dataset.ap,'approve',b)));
  v.querySelectorAll('[data-rj]').forEach(b=>b.addEventListener('click',()=>{ if(confirm('Recusar/revogar este cadastro? O acesso (se existir) será desativado.')) decide(b.dataset.rj,'reject',b); }));
  }
  apply();
}

/* ---------- CONTEÚDO DO PRESCRITOR (área logada — vale na hora, sem Publicar) ---------- */
const PC_TYPES={artigo:'Artigo científico',pdf:'PDF',formula:'Fórmula sugerida'};
async function vPreContent(){
  const v=$('#view'); v.innerHTML='<div class="topbar"><div><h1 class="page">Conteúdo do prescritor</h1><p class="hint">Artigos, PDFs e fórmulas da área logada. Vale na hora — não precisa de “Publicar”.</p></div><button class="btn" id="new">+ Novo conteúdo</button></div><div id="rows">Carregando…</div>';
  let snap;
  try{ snap = await db.collection('prescriber_content').get(); }
  catch(e){ $('#rows').innerHTML='<div class="empty">Não foi possível carregar o conteúdo. Recarregue a página.</div>'; $('#new').addEventListener('click',()=>editPreContent(null)); return; }
  const items = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.publishedAt||'').localeCompare(a.publishedAt||''));
  if(!items.length){ $('#rows').innerHTML='<div class="empty">Nenhum conteúdo ainda. Clique em “+ Novo conteúdo”.</div>'; }
  else{
    let h='<table><thead><tr><th>Data</th><th>Título</th><th>Tipo</th><th></th><th></th></tr></thead><tbody>';
    items.forEach(p=>{h+=`<tr><td>${(p.publishedAt||'').slice(0,10)}</td><td class="postrow-title">${esc(p.title)}</td><td>${PC_TYPES[p.type]||esc(p.type)}</td>
      <td><button class="btn btn--ghost btn--sm" data-edit="${p.id}">Editar</button></td>
      <td><button class="btn btn--danger btn--sm" data-del="${p.id}">Excluir</button></td></tr>`;});
    h+='</tbody></table>'; $('#rows').innerHTML=h;
    v.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>editPreContent(items.find(p=>p.id===b.dataset.edit))));
    v.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{
      const p=items.find(x=>x.id===b.dataset.del);
      if(confirm(`Excluir “${p.title}”? Some da área do prescritor imediatamente.`)){
        try{ await db.collection('prescriber_content').doc(p.id).delete(); }
        catch(err){ alert('Não foi possível excluir: '+err.message); return; }
        vPreContent();
      }
    }));
  }
  $('#new').addEventListener('click',()=>editPreContent(null));
}
function editPreContent(p){
  const isNew=!p; p=p||{type:'artigo'};
  const typeOpts=Object.entries(PC_TYPES).map(([k,l])=>`<option value="${k}" ${k===p.type?'selected':''}>${l}</option>`).join('');
  const bg=document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML=`<div class="modal"><h2>${isNew?'Novo conteúdo':'Editar conteúdo'}</h2>
    <label>Título</label><input class="fld" id="c-title" value="${esc(p.title||'')}">
    <div class="row"><div><label>Tipo</label><select class="fld" id="c-type">${typeOpts}</select></div>
    <div><label>Data (AAAA-MM-DD)</label><input class="fld" id="c-date" value="${(p.publishedAt||new Date().toISOString()).slice(0,10)}"></div></div>
    <div id="c-pdf-row" class="hidden"><label>Arquivo PDF</label>
      <div class="row"><input class="fld" id="c-file-url" readonly placeholder="Nenhum arquivo enviado" value="${esc(p.fileUrl||'')}">
      <button class="btn btn--ghost" id="c-upl" style="flex:0">⬆ Enviar PDF</button></div>
      <input type="file" id="c-file" accept="application/pdf" class="hidden">
      <label style="margin-top:14px">Resumo (aparece no card)</label><textarea class="fld" id="c-exc" style="min-height:70px">${esc(p.excerpt||'')}</textarea></div>
    <div id="c-body-row"><label>Conteúdo (HTML — use &lt;h3&gt;, &lt;p&gt;, &lt;ul&gt;&lt;li&gt;, &lt;strong&gt;)</label>
      <textarea class="fld code" id="c-body" style="min-height:220px">${esc(p.body||'<p></p>')}</textarea></div>
    <p class="msg" id="c-msg"></p>
    <div class="row" style="margin-top:14px"><button class="btn" id="c-save" style="flex:0">Salvar</button><button class="btn btn--ghost" id="c-cancel" style="flex:0">Cancelar</button></div>
  </div>`;
  document.body.appendChild(bg);
  const q=s=>bg.querySelector(s);
  function syncType(){ const t=q('#c-type').value; q('#c-pdf-row').classList.toggle('hidden',t!=='pdf'); q('#c-body-row').classList.toggle('hidden',t==='pdf'); }
  syncType(); q('#c-type').addEventListener('change',syncType);
  q('#c-cancel').addEventListener('click',()=>bg.remove());
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
  q('#c-upl').addEventListener('click',()=>q('#c-file').click());
  q('#c-file').addEventListener('change',async()=>{
    const f=q('#c-file').files[0]; if(!f) return; const m=q('#c-msg');
    m.className='msg'; m.textContent='Enviando PDF…';
    try{ q('#c-file-url').value=await uploadFile(f); m.className='msg ok'; m.textContent='PDF enviado ✓'; }
    catch(e){ m.className='msg err'; m.textContent=e.message; }
  });
  q('#c-save').addEventListener('click',async()=>{
    const m=q('#c-msg'); const title=q('#c-title').value.trim(); const type=q('#c-type').value;
    if(!title){m.className='msg err';m.textContent='Título é obrigatório.';return;}
    if(type==='pdf'&&!q('#c-file-url').value){m.className='msg err';m.textContent='Envie o arquivo PDF.';return;}
    const dateStr=q('#c-date').value.trim();
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)||isNaN(new Date(dateStr+'T10:00:00').getTime())){m.className='msg err';m.textContent='Data inválida — use o formato AAAA-MM-DD.';return;}
    const doc={ title, type, publishedAt:dateStr+'T10:00:00',
      excerpt:q('#c-exc')?q('#c-exc').value.trim():'',
      body:type==='pdf'?'':q('#c-body').value, fileUrl:type==='pdf'?q('#c-file-url').value:'' };
    m.className='msg'; m.textContent='Salvando…';
    try{
      if(p.id) await db.collection('prescriber_content').doc(p.id).set(doc,{merge:true});
      else await db.collection('prescriber_content').add(doc);
    }catch(err){ m.className='msg err'; m.textContent='Não foi possível salvar: '+err.message; return; }
    bg.remove(); vPreContent();
  });
}

  let snap;
  try{ snap = await db.collection('newsletter').orderBy('createdAt','desc').limit(1000).get(); }
  catch(e){ $('#rows').innerHTML='<div class="empty">Não foi possível carregar os inscritos. Recarregue a página.</div>'; return; }
  if(snap.empty){ $('#ncount').textContent='Nenhum inscrito ainda.'; $('#rows').innerHTML='<div class="empty">Nenhum inscrito ainda.</div>'; return; }
  const all = snap.docs.map(d=>({id:d.id,...d.data()}));
  const fill=(sel,vals)=>{const s=$(sel);[...new Set(vals.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt')).forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;s.appendChild(o);});};
  fill('#nf-src',all.map(m=>m.source));
  let current=all;
  function apply(){
    const sr=$('#nf-src').value, q=$('#nf-q').value.trim().toLowerCase();
    current=all.filter(m=>(!sr||m.source===sr)&&(!q||String(m.email||'').toLowerCase().includes(q)));
    $('#ncount').textContent=`${current.length} de ${all.length} inscrito(s).`;
    render(current);
  }
  function render(list){
    if(!list.length){ $('#rows').innerHTML='<div class="empty">Nenhum inscrito com esses filtros.</div>'; return; }
    let h='<table><thead><tr><th>Quando</th><th>E-mail</th><th>Origem</th><th></th></tr></thead><tbody>';
    list.forEach(m=>{ h+=`<tr><td>${fmtTs(m.createdAt)}</td><td>${esc(m.email)}</td><td>${esc(m.source||'')}</td><td><button class="btn btn--danger btn--sm" data-ndel="${m.id}">Apagar</button></td></tr>`; });
    h+='</tbody></table>'; $('#rows').innerHTML=h;
    $('#rows').querySelectorAll('[data-ndel]').forEach(b=>b.addEventListener('click',async()=>{
      if(!confirm('Remover este e-mail da base de mailing?')) return; b.disabled=true;
      if(!await adminDelete('newsletter', b.dataset.ndel)){ b.disabled=false; return; }
      const i=all.findIndex(x=>x.id===b.dataset.ndel); if(i>=0)all.splice(i,1);
      apply();
    }));
  }
  $('#nf-src').addEventListener('change',apply);
  $('#nf-q').addEventListener('input',apply);
  $('#nf-clear').addEventListener('click',()=>{$('#nf-src').value='';$('#nf-q').value='';apply();});
  $('#n-csv').addEventListener('click',()=>{
    const rows=[['email','origem','data']];
    current.forEach(m=>rows.push([m.email,m.source||'',fmtTsCSV(m.createdAt)]));
    const csv='﻿'+rows.map(r=>r.map(c=>`"${csvSafe(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'})); a.download='newsletter-aformula.csv'; a.click();
  });
  apply();
}

/* ---------- SETTINGS ---------- */
async function vSettings(){
  const v=$('#view'); v.innerHTML='<div class="topbar"><div><h1 class="page">Configurações</h1><p class="hint">Dados globais usados no site inteiro.</p></div></div><div class="card" style="max-width:720px" id="sx">Carregando…</div>';
  let d;
  try{ d=await db.collection('settings').doc('global').get(); }
  catch(e){ $('#sx').innerHTML='Não foi possível carregar as configurações. Recarregue a página.'; return; }
  const s=d.data()||{};
  const f=(k,l,ph)=>`<div><label>${l}</label><input class="fld" id="s-${k}" value="${esc(s[k]||'')}"${ph?` placeholder="${ph}"`:''}></div>`;
  $('#sx').innerHTML=`<div class="row">${f('years','Anos de história','ex.: 38 (só o número)')}${f('notifyEmail','E-mail p/ notificações','nome@dominio.com.br')}</div>
    <div class="row">${f('sacEmail','E-mail SAC','sac@aformulabr.com.br')}${f('petEmail','E-mail Pet','pet@aformulabr.com.br')}</div>
    ${f('franchiseUrl','URL Seja franqueado','https://…')}
    <div class="row">${f('instagram','Instagram (URL completa)','https://www.instagram.com/…')}${f('facebook','Facebook (URL completa)','https://www.facebook.com/…')}</div>
    <div class="row">${f('youtube','YouTube (URL completa)','https://www.youtube.com/@…')}${f('linkedin','LinkedIn (URL completa)','https://www.linkedin.com/company/…')}</div>
    ${f('recaptchaSiteKey','reCAPTCHA site key (cadastro de prescritor)','6L…')}
    <p class="hint" style="margin-top:10px">Campo vazio ou em formato inválido é ignorado na publicação — o site mantém o valor atual.</p>
    <p class="msg" id="s-msg"></p><div style="margin-top:14px"><button class="btn" id="s-save">Salvar</button></div>`;
  $('#s-save').addEventListener('click',async()=>{
    const m=$('#s-msg');
    const yearsRaw=$('#s-years').value.trim();
    if(yearsRaw && !/^\d{1,3}$/.test(yearsRaw)){ m.className='msg err'; m.textContent='“Anos de história”: digite só o número (ex.: 38).'; return; }
    const keys=['years','notifyEmail','sacEmail','petEmail','franchiseUrl','instagram','facebook','youtube','linkedin','recaptchaSiteKey'];
    const upd={}; keys.forEach(k=>{let val=$('#s-'+k).value; if(k==='years')val=parseInt(val)||val; upd[k]=val;});
    m.className='msg';m.textContent='Salvando…';
    try{ await db.collection('settings').doc('global').set(upd,{merge:true}); }
    catch(e){ m.className='msg err'; m.textContent='Não foi possível salvar: '+e.message; return; }
    m.className='msg ok';m.textContent='Salvo.';
  });
}

/* ---------- PUBLICAR ---------- */
async function triggerBuild(target){
  const token = await auth.currentUser.getIdToken();
  const r = await fetch('/api/publish?target='+target,{method:'POST',headers:{Authorization:'Bearer '+token}});
  const data = await r.json().catch(()=>({}));
  if(!r.ok || !data.ok) throw new Error(data.error||'falha');
  return data;
}
$('#btn-publish').addEventListener('click',async()=>{
  const btn=$('#btn-publish'), pb=$('#pubbar'), t=$('#pub-title'), hint=$('#pub-hint');
  if(!confirm('Publicar as alterações no site ao vivo? Leva 1–2 minutos.')) return;
  btn.disabled=true; t.textContent='Publicando…'; hint.textContent='Isso leva 1–2 minutos. Pode continuar usando o painel.';
  try{
    await triggerBuild('production');
    pb.classList.add('clean'); t.textContent='Publicação iniciada ✓'; hint.textContent='O site no ar reflete as mudanças em 1–2 minutos.';
  }catch(e){ t.textContent='Não foi possível publicar.'; hint.textContent='Tente de novo; se persistir, avise o suporte técnico.'; }
  finally{ btn.disabled=false; }
});
</script>

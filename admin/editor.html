<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root{
    --teal:#008896; --teal-d:#063237; --teal-700:#00525d; --ink:#16282b;
    --mut:#5c7075; --line:#e2e8e9; --bg:#eef3f3; --white:#fff;
    --ok:#0a8f5b; --warn:#c67a12; --err:#c0392b;
    --sans:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:14.5px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--teal)}
  .hidden{display:none!important}
  .btn{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px}
  .btn:hover{background:var(--teal-700)} .btn:disabled{opacity:.5;cursor:default}
  .btn--ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
  .btn--ghost:hover{background:var(--teal);color:#fff}
  .btn--sm{padding:7px 13px;font-size:12.5px;border-radius:8px}

  /* login (mesma lógica do painel) */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:34px;box-shadow:0 12px 40px rgba(6,50,55,.08);width:100%;max-width:380px}
  .brand{font-weight:800;font-size:20px;color:var(--teal-d);margin:0 0 4px}
  .brand span{color:var(--teal)}
  .sub{color:var(--mut);margin:0 0 24px;font-size:13px}
  label{display:block;font-weight:600;font-size:12.5px;margin:14px 0 6px;color:var(--teal-d)}
  .fld{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fbfdfd;outline:none}
  .fld:focus{border-color:var(--teal)}
  .msg{margin-top:14px;font-size:13px;min-height:18px}
  .msg.err{color:var(--err)} .msg.ok{color:var(--ok)}

  /* shell do editor */
  #app{display:flex;flex-direction:column;height:100vh}
  .topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--teal-d);color:#eaf4f4;flex:0 0 auto;flex-wrap:wrap}
  .topbar .brand{color:#fff;font-size:16px;margin:0}
  .topbar select{padding:8px 10px;border-radius:9px;border:1px solid rgba(255,255,255,.25);background:#0a3b41;color:#fff;font-weight:600}
  .seg{display:flex;border:1px solid rgba(255,255,255,.25);border-radius:9px;overflow:hidden}
  .seg button{background:#0a3b41;color:#bcd4d6;border:none;padding:8px 12px;font-size:13px;font-weight:600}
  .seg button.on{background:var(--teal);color:#fff}
  .spacer{flex:1}
  .dirty{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#ffd9a0}
  .dirty .dot{width:9px;height:9px;border-radius:50%;background:var(--warn)}
  .dirty.clean{color:#9fd6c2}.dirty.clean .dot{background:var(--ok)}
  .top-link{color:#bcd4d6;font-size:12.5px;text-decoration:none}
  .top-link:hover{color:#fff;text-decoration:underline}

  /* workspace = painel esquerdo (editor) + canvas direito (preview) */
  .workspace{flex:1;display:flex;min-height:0}
  .lpane{width:344px;flex:0 0 344px;background:var(--white);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .lp-head{padding:11px 14px;font-weight:800;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--line);background:#f7fafa}
  .seclist{overflow:auto;flex:0 0 auto;max-height:40%;border-bottom:1px solid var(--line)}
  .sec-row{display:flex;align-items:center;gap:5px;padding:8px 10px 8px 13px;border-bottom:1px solid #f0f4f4}
  .sec-row .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13.5px;cursor:pointer}
  .sec-row:hover{background:#f4f9f9}
  .sec-row.active{background:#e7f4f5;box-shadow:inset 3px 0 0 var(--teal)}
  .sec-row.hid .nm{opacity:.5;text-decoration:line-through}
  .sec-row.footer-row{border-top:1px solid var(--line);background:#f7fafa}
  .mini{background:#eef3f3;border:1px solid var(--line);border-radius:6px;width:26px;height:26px;font-size:13px;color:var(--teal-d);flex:0 0 auto;line-height:1}
  .mini:hover:not(:disabled){background:var(--teal);color:#fff;border-color:var(--teal)}
  .mini:disabled{opacity:.3;cursor:default}
  .insp{flex:1;overflow:auto;padding:14px}
  .insp .empty{color:var(--mut);font-size:13px;padding:24px 6px;text-align:center}
  .insp-title{font-weight:800;font-size:15px;color:var(--teal-d);margin:0 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .fgroup{margin-bottom:15px}
  .fgroup[data-field]:target{outline:2px solid var(--teal)}
  .flabel{font-weight:700;font-size:11px;color:var(--teal-d);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
  .insp-rich{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;min-height:38px;max-height:200px;overflow:auto;background:#fbfdfd;outline:none;line-height:1.45}
  .insp-rich:focus{border-color:var(--teal);background:#fff}
  .insp-img img{width:100%;max-height:120px;object-fit:contain;background:#f2f7f7;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;display:block}
  .insp-up{width:100%;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:9px;font-weight:700;margin-bottom:6px}
  .insp-up:hover{background:var(--teal-700)}
  .insp-url{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;margin-bottom:6px;outline:none}
  .insp-url:focus{border-color:var(--teal)}
  .insp-msg{font-size:11.5px;color:var(--mut);min-height:14px}
  .item-block{border:1px solid var(--line);border-radius:10px;margin-bottom:9px;overflow:hidden}
  .item-head{display:flex;align-items:center;gap:5px;padding:7px 9px;background:#f4f9f9}
  .item-head .tw{color:var(--mut);flex:0 0 auto}
  .item-head .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12.5px;font-weight:600;cursor:pointer}
  .item-body{padding:11px;border-top:1px solid var(--line)}
  .tag-warn{background:#fdf2e2;color:#8a5410;border:1px solid #f0d6a8;border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:12px}

  /* canvas / preview */
  .cpane{flex:1;position:relative;overflow:auto;background:#dfe8e8;display:flex;justify-content:center}
  .frame-shell{width:100%;background:#fff;transition:width .25s ease;box-shadow:0 0 0 1px var(--line)}
  .frame-shell.mobile{width:390px;margin:18px 0;box-shadow:0 10px 40px rgba(6,50,55,.18);border-radius:24px;overflow:hidden;height:calc(100% - 36px)}
  iframe{width:100%;height:100%;border:0;display:block}
  .frame-shell:not(.mobile) iframe{min-height:100%}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:14px;background:rgba(255,255,255,.7);z-index:5}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--teal-d);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:9999;max-width:80vw}
  .toast.err{background:var(--err)} .toast.ok{background:var(--ok)}
</style>

const auth = firebase.auth();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{}); // sessão persiste entre reloads/abas
const db = firebase.firestore();
const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const cssEsc = s => (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/[^a-zA-Z0-9_-]/g,'\\$&');

/* ---------- TOAST ---------- */
let toastT;
function toast(msg, kind){
  clearTimeout(toastT);
  let t=$('#toast'); if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.className='toast'+(kind?' '+kind:''); t.textContent=msg; t.style.display='block';
  toastT=setTimeout(()=>t.style.display='none', kind==='err'?5200:3200);
}

/* ---------- AUTH ---------- */
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault(); const m=$('#lg-msg'); m.className='msg'; m.textContent='Entrando…';
  try{ await auth.signInWithEmailAndPassword($('#lg-email').value.trim(), $('#lg-pass').value); }
  catch(err){ m.className='msg err'; m.textContent = err.code==='auth/invalid-credential'?'E-mail ou senha incorretos.':err.message; }
});
$('#logout').addEventListener('click', e=>{ e.preventDefault(); auth.signOut(); });

// Gate no cliente é só UX — o gate REAL é o servidor (verifyAdmin) + as regras do Firestore.
// NUNCA desloga por erro transitório (rede, refresh de token, signOut de outra aba):
// só desloga se a leitura teve SUCESSO e o doc de admin não existe (negação definitiva).
auth.onAuthStateChanged(async user=>{
  if(!user){ $('#login').classList.remove('hidden'); $('#app').classList.add('hidden'); return; }
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  boot();
  try{
    const s = await db.collection('admins').doc(user.email).get();
    if(!s.exists){
      $('#lg-msg').className='msg err'; $('#lg-msg').textContent='Este usuário não tem acesso ao editor.';
      $('#app').classList.add('hidden'); $('#login').classList.remove('hidden');
      await auth.signOut();
    }
  }catch(_){ /* erro transitório: mantém logado */ }
});

/* Upload de mídia (idêntico ao painel — Vercel Blob via /api/upload, gated por admin) */
async function uploadFile(file){
  if(!auth.currentUser) throw new Error('Faça login para enviar imagens.');
  if(file.size>4*1024*1024) throw new Error('Arquivo acima de 4 MB — reduza antes de enviar.');
  const token=await auth.currentUser.getIdToken();
  const r=await fetch('/api/upload?filename='+encodeURIComponent(file.name)+'&type='+encodeURIComponent(file.type||'application/octet-stream'),
    {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/octet-stream'},body:file});
  const j=await r.json().catch(()=>({}));
  if(!j.ok) throw new Error(j.error==='type'?'Formato não permitido (use imagem ou PDF).':'Falha no upload — tente de novo.');
  return j.url;
}

/* ======================================================================
   ESTADO GLOBAL DO EDITOR
====================================================================== */
const frame = $('#frame');
const idoc = () => frame.contentDocument;
let CONFIG = null;                // cms-config.json
let PAGE = null;                  // config da página atual { key,label,url,doc,anchor,collections }
const state = {
  doc: null,                      // pages/{doc} — mutado ao vivo
  footer: {},                     // settings/global.footer — mutado ao vivo
  footerFields: [],               // [{key,label,el,set}] resolvidos no DOM
  dirty: false, footerDirty: false,
  model: [],                      // [{sec, secEl, col, itemNodes, mismatch}]
  secAnchor: null                 // nó de referência após a última seção (âncora de reordenação)
};

/* Config provisória (só o pet) caso cms-config.json ainda não exista */
const FALLBACK_CONFIG = { pages:[{
  key:'pet', label:'Página Pet', url:'/pet.html', doc:'pet', anchor:'data-dc-tpl',
  collections:{
    beneficios:{selector:'.pet-card[data-fade]'},
    formas:{selector:'[data-formas-track] > div'},
    sabores:{selector:'.pet-chip'},
    paraquem:{selector:'.pet-card.quem-card'},
    faq:{selector:'[data-faq-item]'}
  }
}]};

/* Rodapé — defaults (idênticos ao painel) */
const FOOTER_TEXTS = {
  brand:'Há 37 anos transformando manipulação em ciência, cuidado e inovação.',
  copyright:'© A Fórmula 2026',
  legal1:'A FÓRMULA SERVIÇOS E FRANCHISE LTDA — CNPJ: 10.760.350/0001-00',
  legal2:'Rua Tabapuã, 627 — Itaim Bibi, São Paulo - SP'
};
const FOOTER_TEXT_LABELS = { brand:'Frase da marca', copyright:'Copyright', legal1:'Razão social / CNPJ', legal2:'Endereço' };
const FOOTER_LINKS = { sobrenos:'Sobre nós', blog:'Blog', prescritor:'Área do prescritor', lgpd:'LGPD', loja:'Encontre uma loja' };

/* ======================================================================
   BOOT + TROCA DE PÁGINA
====================================================================== */
async function boot(){
  try{ CONFIG = await fetch('./cms-config.json',{cache:'no-store'}).then(r=>r.ok?r.json():Promise.reject()); }
  catch(e){ CONFIG = FALLBACK_CONFIG; }
  if(!CONFIG.pages || !CONFIG.pages.length) CONFIG = FALLBACK_CONFIG;
  const sel=$('#page-sel'); sel.innerHTML='';
  CONFIG.pages.forEach(p=>{ const o=document.createElement('option'); o.value=p.key; o.textContent=p.label; sel.appendChild(o); });
  sel.onchange=()=>{
    if((state.dirty||state.footerDirty) && !confirm('Há alterações não salvas. Trocar de página vai descartá-las?')){
      sel.value = PAGE.key; return;
    }
    loadPage(sel.value);
  };
  loadPage(CONFIG.pages[0].key);
}

async function loadPage(key){
  PAGE = CONFIG.pages.find(p=>p.key===key) || CONFIG.pages[0];
  state.doc=null; state.footer={}; state.footerFields=[]; state.dirty=false; state.footerDirty=false; state.model=[]; selM=null; selFooter=false;
  markClean();
  $('#seclist').innerHTML=''; $('#insp').innerHTML='<div class="empty">Carregando…</div>';
  $('#loading').style.display='flex'; $('#loading').textContent='Carregando conteúdo…';
  // 1) carrega doc da página + rodapé global (leitura pública)
  try{
    const [pd, sg] = await Promise.all([
      db.collection('pages').doc(PAGE.doc).get(),
      db.collection('settings').doc('global').get()
    ]);
    state.doc = pd.exists ? pd.data() : {sections:[]};
    state.footer = (sg.data()||{}).footer || {};
  }catch(e){ state.doc={sections:[]}; state.footer={}; toast('Não consegui ler o conteúdo salvo: '+e.message,'err'); }
  // 2) aponta o iframe pra versão no ar
  $('#loading').textContent='Carregando página…';
  frame.addEventListener('load', onFrameLoad, {once:true});
  frame.src = PAGE.url + '?cmsx='+Date.now();  // cache-bust
}

function onFrameLoad(){
  try{ setupCanvas(); }
  catch(e){ console.error(e); toast('Erro ao preparar o editor: '+e.message,'err'); }
  $('#loading').style.display='none';
}

/* ======================================================================
   PREPARO DO CANVAS (dentro do iframe, mesma origem)
====================================================================== */
function setupCanvas(){
  const d = idoc();
  // A) neutraliza animações de reveal + injeta estilos do editor (só realce/oculto)
  d.documentElement.classList.remove('anim');
  const st = d.createElement('style');
  st.textContent = `
    [data-fade],[data-reveal],.reveal{opacity:1!important;transform:none!important}
    .cmsx-hl{outline:2px dashed #00abbf!important;outline-offset:2px;cursor:pointer}
    .cmsx-sel{outline:2px solid #008896!important;outline-offset:2px}
    .cmsx-selsec{box-shadow:inset 0 0 0 2px rgba(0,136,150,.35)!important}
    .cmsx-hiddenmark{position:relative;opacity:.35!important}
    .cmsx-tarja{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:20;background:#c67a12;color:#fff;font:800 11.5px system-ui,sans-serif;padding:4px 11px;border-radius:999px;pointer-events:none;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  `;
  d.head.appendChild(st);

  // B) mata navegação interna + submits e pausa vídeos autoplay
  d.addEventListener('click', e=>{ const a=e.target.closest('a'); if(a){ e.preventDefault(); } }, true);
  d.addEventListener('submit', e=>e.preventDefault(), true);
  d.querySelectorAll('video[autoplay]').forEach(v=>{ try{ v.pause(); v.removeAttribute('autoplay'); }catch(_){} });

  // C) monta modelo + aplica doc salvo sobre o DOM + cabeia seleção no canvas + monta painel
  buildModel();
  applyDocToDom();
  collectFooter();
  wireCanvasSelect();
  renderPanel();
  if(state.model.length) selectSection(state.model[0], {scroll:false});
  else selectFooter({scroll:false});
}

/* ---------- helpers de mapeamento doc↔DOM ---------- */
const A = () => PAGE.anchor;
function secElByTpl(tpl){ return idoc().querySelector('['+A()+'="'+tpl+'"]'); }
function textEl(secEl, id){ return secEl.querySelector('['+A()+'="'+id+'"]'); }
function itemNodesOf(secEl, col){ return col && col.selector ? Array.from(secEl.querySelectorAll(col.selector)) : []; }
// imgs da seção = todas as <img> da seção EXCETO as que estão dentro de um item de coleção
function sectionImgs(secEl, itemNodes){
  return Array.from(secEl.querySelectorAll('img')).filter(im => !itemNodes.some(n=>n.contains(im)));
}
function tailTextNode(item){
  const w=idoc().createTreeWalker(item, NodeFilter.SHOW_TEXT, null);
  let last=null, n; while((n=w.nextNode())){ if(n.nodeValue && n.nodeValue.trim()) last=n; } return last;
}

function buildModel(){
  state.model = [];
  const cols = PAGE.collections||{};
  (state.doc.sections||[]).forEach(sec=>{
    const secEl = secElByTpl(sec.tpl);
    if(!secEl) return; // seção do doc não encontrada no DOM — ignora
    const col = cols[sec.key] || null;
    const itemNodes = itemNodesOf(secEl, col);
    const docItems = Array.isArray(sec.items)?sec.items:[];
    // conta esperada do DOM vs doc — mismatch bloqueia operações de item
    const mismatch = !!col && docItems.length>0 && itemNodes.length!==docItems.length;
    // tagueia itens com o índice original de documento (base da reordenação)
    itemNodes.forEach((n,i)=>{ n.dataset.cmsxI=i; });
    state.model.push({ sec, secEl, col, itemNodes, mismatch });
  });
  // âncora de reordenação de seção = nó logo após a última seção (geralmente o <footer>)
  if(state.model.length){
    const els = state.model.map(m=>m.secEl);
    const parent = els[0].parentNode;
    const inParent = els.filter(e=>e.parentNode===parent);
    const last = inParent[inParent.length-1];
    state.secAnchor = last ? last.nextSibling : null;
  }
}

/* ---------- aplica valores salvos sobre o DOM (reflete salvo-mas-não-publicado) ---------- */
function applyDocToDom(){
  state.model.forEach(m=>{
    const {sec, secEl, col, itemNodes, mismatch} = m;
    // textos de seção
    for(const [id,t] of Object.entries(sec.texts||{})){
      const el=textEl(secEl,id); if(el && typeof t.val==='string' && el.innerHTML!==t.val) el.innerHTML=t.val;
    }
    // imgs de seção
    const imgs=sectionImgs(secEl,itemNodes);
    for(const [idx,im] of Object.entries(sec.imgs||{})){
      const el=imgs[+idx]; if(el && im.val && el.getAttribute('src')!==im.val) el.src=im.val;
    }
    // itens
    if(col && !mismatch && Array.isArray(sec.items)){
      // conteúdo dos itens
      sec.items.forEach(it=>{
        const node=itemNodes[it.i]; if(!node) return;
        for(const [k,t] of Object.entries(it.texts||{})){
          const el=itemTextEl(node,k); if(el && typeof t.val==='string' && el.innerHTML!==t.val) el.innerHTML=t.val;
        }
        for(const [idx,im] of Object.entries(it.imgs||{})){
          const el=node.querySelectorAll('img')[+idx]; if(el && im.val && el.getAttribute('src')!==im.val) el.src=im.val;
        }
        if(it.tail && it.tail.val){ const tn=tailTextNode(node); if(tn && tn.nodeValue!==it.tail.val) tn.nodeValue=it.tail.val; }
      });
      // ordem + visibilidade dos itens
      applyItemOrder(m);
    }
  });
  // ordem + visibilidade das seções
  applySectionOrder();
  state.model.forEach(m=>{ if(m.sec.v===false) markHidden(m.secEl,'seção oculta — some ao publicar'); });
}

function itemTextEl(node,key){
  const dash=key.lastIndexOf('-'); const tag=key.slice(0,dash); const n=+key.slice(dash+1);
  const list=node.getElementsByTagName(tag); return list[n]||null;
}

function applySectionOrder(){
  if(!state.model.length) return;
  const parent=state.model[0].secEl.parentNode;
  if(!state.model.every(m=>m.secEl.parentNode===parent)) return; // parents diferentes — não arrisca
  // seções na ORDEM DO DOC, presentes no DOM sob o mesmo parent
  const desired=state.doc.sections.map(s=>secElByTpl(s.tpl)).filter(el=>el && el.parentNode===parent);
  if(desired.length<2) return;
  // já está nessa ordem no DOM? então NÃO mexe — evita agrupar seções e destruir a "mobília"
  // (conteúdo fixo entre seções, ex.: rotator/galeria da home). Só reordena quando realmente mudou.
  let already=true;
  for(let i=0;i<desired.length-1;i++){
    if(!(desired[i].compareDocumentPosition(desired[i+1]) & Node.DOCUMENT_POSITION_FOLLOWING)){ already=false; break; }
  }
  if(already) return;
  // reordena PRESERVANDO a mobília: marca a posição de cada "slot" atual com um comentário e
  // recoloca as seções (ordem do doc) nesses slots; nós que não são seção ficam onde estão.
  const slots=desired.slice().sort((a,b)=> (a.compareDocumentPosition(b) & Node.DOCUMENT_POSITION_FOLLOWING) ? -1 : 1);
  const marks=slots.map(n=>{ const c=idoc().createComment('cmsx-slot'); parent.insertBefore(c, n); return c; });
  desired.forEach((el,i)=>parent.insertBefore(el, marks[i]));
  marks.forEach(c=>c.remove());
}

function applyItemOrder(m){
  const {sec,itemNodes}=m;
  if(!itemNodes.length) return;
  const parent=itemNodes[0].parentNode;
  if(!itemNodes.every(n=>n.parentNode===parent)) return;
  const anchor=itemNodes[itemNodes.length-1].nextSibling;
  sec.items.forEach(it=>{
    const node=itemNodes[it.i]; if(!node||node.parentNode!==parent) return;
    parent.insertBefore(node, anchor);
    markHidden(node, it.v===false ? 'item oculto — some ao publicar' : null);
  });
}

/* ---------- ocultar / reexibir (opacity .35 + tarja) ---------- */
function markHidden(el, label){
  const d=idoc();
  let tarja=el.querySelector(':scope > .cmsx-tarja');
  if(label){
    el.classList.add('cmsx-hiddenmark');
    if(!tarja){ tarja=d.createElement('div'); tarja.className='cmsx-tarja'; tarja.textContent=label; el.appendChild(tarja); }
  }else{
    el.classList.remove('cmsx-hiddenmark');
    if(tarja) tarja.remove();
  }
}

/* ======================================================================
   SELEÇÃO NO CANVAS (clicar = selecionar; edição acontece à esquerda)
====================================================================== */
const fk = (...p)=>p.join('|');   // chave de campo (data-field)

function wireCanvasSelect(){
  state.model.forEach(m=>{
    const {sec, secEl, col, itemNodes, mismatch}=m;
    // clique em área "vazia" da seção → seleciona a seção
    secEl.addEventListener('click', ()=>selectSection(m));
    // textos da seção
    for(const id of Object.keys(sec.texts||{})) tagEditable(textEl(secEl,id), m, fk('t',id));
    // imgs da seção
    const imgs=sectionImgs(secEl,itemNodes);
    for(const idx of Object.keys(sec.imgs||{})) tagEditable(imgs[+idx], m, fk('si',idx));
    // itens da coleção
    if(col && !mismatch && Array.isArray(sec.items)){
      sec.items.forEach(it=>{
        const node=itemNodes[it.i]; if(!node) return;
        for(const k of Object.keys(it.texts||{})) tagEditable(itemTextEl(node,k), m, fk('it',it.i,'t',k));
        for(const idx of Object.keys(it.imgs||{})) tagEditable(node.querySelectorAll('img')[+idx], m, fk('it',it.i,'si',idx));
        if(it.tail) tagEditable(node, m, fk('it',it.i,'tail'));
      });
    }
  });
}
function tagEditable(el, m, key){
  if(!el) return;
  el.dataset.cmsxKey=key;
  el.addEventListener('mouseenter',()=>el.classList.add('cmsx-hl'));
  el.addEventListener('mouseleave',()=>el.classList.remove('cmsx-hl'));
  el.addEventListener('click', e=>{ e.preventDefault(); e.stopPropagation(); onPick(m, key); });
}
function onPick(m, key){ selectSection(m); requestAnimationFrame(()=>focusField(key)); }

/* ======================================================================
   PAINEL ESQUERDO: lista de seções (camadas) + inspetor
====================================================================== */
let selM = null;          // section model selecionado
let selFooter = false;
let panelRows = [];       // [{row, m}]
let itemExpand = {};       // i -> fn que expande o bloco do item no inspetor

function renderPanel(){
  const list=$('#seclist'); list.innerHTML=''; panelRows=[];
  state.doc.sections.forEach(sec=>{
    const m=state.model.find(x=>x.sec===sec); if(!m) return;
    const i=state.doc.sections.indexOf(sec);
    const row=document.createElement('div'); row.className='sec-row'+(sec.v===false?' hid':'');
    row.innerHTML=`<span class="nm">${esc(sec.label||sec.key)}</span>
      <button class="mini" data-a="up" ${i<=0?'disabled':''} title="Subir seção">↑</button>
      <button class="mini" data-a="dn" ${i>=state.doc.sections.length-1?'disabled':''} title="Descer seção">↓</button>
      <button class="mini" data-a="hide" title="Ocultar / mostrar">${sec.v===false?'🚫':'👁'}</button>`;
    row.querySelector('.nm').addEventListener('click', ()=>selectSection(m));
    row.querySelector('[data-a="up"]').addEventListener('click', e=>{ e.stopPropagation(); moveSection(sec,-1); });
    row.querySelector('[data-a="dn"]').addEventListener('click', e=>{ e.stopPropagation(); moveSection(sec,1); });
    row.querySelector('[data-a="hide"]').addEventListener('click', e=>{ e.stopPropagation(); toggleSection(m); });
    list.appendChild(row); panelRows.push({row, m});
  });
  // linha do rodapé (vale pra todas as páginas)
  const fr=document.createElement('div'); fr.className='sec-row footer-row';
  fr.innerHTML='<span class="nm">🔗 Rodapé (todas as páginas)</span>';
  fr.querySelector('.nm').addEventListener('click', ()=>selectFooter());
  list.appendChild(fr);
  // mantém seleção corrente
  if(selFooter) markRowsActive(null);
  else if(selM) markRowsActive(selM);
}
function markRowsActive(m){ panelRows.forEach(pr=>pr.row.classList.toggle('active', pr.m===m)); }

function selectSection(m, opts){
  opts=opts||{};
  selFooter=false; selM=m; itemExpand={};
  markRowsActive(m);
  const d=idoc();
  d.querySelectorAll('.cmsx-selsec').forEach(x=>x.classList.remove('cmsx-selsec'));
  m.secEl.classList.add('cmsx-selsec');
  if(opts.scroll!==false) m.secEl.scrollIntoView({behavior:'smooth', block:'start'});
  renderInspector(m);
}

function renderInspector(m){
  const box=$('#insp'); box.innerHTML=''; itemExpand={};
  const {sec, secEl, col, itemNodes, mismatch}=m;
  const h=document.createElement('div'); h.className='insp-title'; h.textContent=sec.label||sec.key; box.appendChild(h);
  let any=false;
  // textos da seção
  for(const [id,t] of Object.entries(sec.texts||{})){
    const el=textEl(secEl,id); if(!el) continue; any=true;
    box.appendChild(richField('Texto', fk('t',id), el.innerHTML, v=>{ el.innerHTML=v; t.val=v; markDirty(); }));
  }
  // imgs da seção
  const imgs=sectionImgs(secEl,itemNodes);
  for(const [idx,im] of Object.entries(sec.imgs||{})){
    const el=imgs[+idx]; if(!el) continue; any=true;
    box.appendChild(imgField('Imagem', fk('si',idx), el, v=>{ el.src=v; im.val=v; markDirty(); }));
  }
  // itens da coleção
  if(col && Array.isArray(sec.items) && sec.items.length){
    const hh=document.createElement('div'); hh.className='flabel'; hh.style.margin='4px 0 8px'; hh.textContent='Itens'; box.appendChild(hh);
    if(mismatch){
      const w=document.createElement('div'); w.className='tag-warn';
      w.textContent='⚠ A estrutura desta seção mudou no código — a edição de itens está travada por segurança.';
      box.appendChild(w);
    }else{
      any=true;
      sec.items.forEach(it=>box.appendChild(itemBlock(m, it)));
    }
  }
  if(!any){ const e=document.createElement('div'); e.className='empty'; e.textContent='Nada editável nesta seção.'; box.appendChild(e); }
}

/* ---------- campos do inspetor ---------- */
function richField(label, key, html, onChange){
  const w=document.createElement('div'); w.className='fgroup'; w.id='f-'+key; w.dataset.field=key;
  const l=document.createElement('div'); l.className='flabel'; l.textContent=label; w.appendChild(l);
  const r=document.createElement('div'); r.className='insp-rich'; r.contentEditable='true'; r.innerHTML=html;
  r.addEventListener('input', ()=>onChange(r.innerHTML));
  w.appendChild(r); return w;
}
function lineField(label, key, val, onChange){
  const w=document.createElement('div'); w.className='fgroup'; w.id='f-'+key; w.dataset.field=key;
  const l=document.createElement('div'); l.className='flabel'; l.textContent=label; w.appendChild(l);
  const inp=document.createElement('input'); inp.className='insp-url'; inp.value=val==null?'':val;
  inp.addEventListener('input', ()=>onChange(inp.value));
  w.appendChild(inp); return w;
}
function imgField(label, key, el, apply){
  const w=document.createElement('div'); w.className='fgroup insp-img'; w.id='f-'+key; w.dataset.field=key;
  const l=document.createElement('div'); l.className='flabel'; l.textContent=label; w.appendChild(l);
  const src=el.getAttribute('src')||'';
  const prev=document.createElement('img'); prev.src=src; prev.alt=''; w.appendChild(prev);
  const up=document.createElement('button'); up.className='insp-up'; up.type='button'; up.textContent='⬆ Enviar nova imagem'; w.appendChild(up);
  const url=document.createElement('input'); url.className='insp-url'; url.value=src; url.placeholder='ou cole uma URL de imagem'; w.appendChild(url);
  const ap=document.createElement('button'); ap.className='btn btn--ghost btn--sm'; ap.type='button'; ap.textContent='Aplicar URL'; ap.style.width='100%'; w.appendChild(ap);
  const msg=document.createElement('div'); msg.className='insp-msg'; w.appendChild(msg);
  const setA=v=>{ apply(v); prev.src=v; };
  ap.addEventListener('click', ()=>{ const u=url.value.trim(); if(u){ setA(u); msg.style.color='var(--ok)'; msg.textContent='Aplicado ✓'; } });
  up.addEventListener('click', ()=>{
    const fi=document.createElement('input'); fi.type='file'; fi.accept='image/*';
    fi.addEventListener('change', async()=>{
      const f=fi.files[0]; if(!f) return; msg.style.color='var(--mut)'; msg.textContent='Enviando…';
      try{ const u=await uploadFile(f); setA(u); url.value=u; msg.style.color='var(--ok)'; msg.textContent='Enviada e aplicada ✓'; }
      catch(err){ msg.style.color='var(--err)'; msg.textContent=err.message; }
    });
    fi.click();
  });
  return w;
}

function itemBlock(m, it){
  const {sec, itemNodes, col}=m; const node=itemNodes[it.i];
  const arr=sec.items; const i=arr.indexOf(it);
  const b=document.createElement('div'); b.className='item-block';
  const head=document.createElement('div'); head.className='item-head';
  const nm=(it.name||'Item').replace(/<[^>]*>/g,'').slice(0,42) || 'Item';
  head.innerHTML=`<span class="tw">▸</span><span class="nm">${esc(nm)}</span>`
    + (col.fixedOrder?'':`<button class="mini" data-a="up" ${i<=0?'disabled':''} title="Subir">↑</button>`
       +`<button class="mini" data-a="dn" ${i>=arr.length-1?'disabled':''} title="Descer">↓</button>`
       +`<button class="mini" data-a="hide" title="Ocultar / mostrar">${it.v===false?'🚫':'👁'}</button>`);
  b.appendChild(head);
  const body=document.createElement('div'); body.className='item-body'; body.style.display='none'; b.appendChild(body);
  let built=false;
  const build=()=>{ if(built||!node) return; built=true;
    let any=false;
    for(const [k,t] of Object.entries(it.texts||{})){ const el=itemTextEl(node,k); if(el){ any=true; body.appendChild(richField('Texto', fk('it',it.i,'t',k), el.innerHTML, v=>{ el.innerHTML=v; t.val=v; markDirty(); })); } }
    for(const [idx,im] of Object.entries(it.imgs||{})){ const el=node.querySelectorAll('img')[+idx]; if(el){ any=true; body.appendChild(imgField('Imagem', fk('it',it.i,'si',idx), el, v=>{ el.src=v; im.val=v; markDirty(); })); } }
    if(it.tail){ any=true; const tn=tailTextNode(node); body.appendChild(lineField('Texto', fk('it',it.i,'tail'), it.tail.val!=null?it.tail.val:(tn?tn.nodeValue:''), v=>{ const t2=tailTextNode(node); if(t2) t2.nodeValue=v; it.tail.val=v; markDirty(); })); }
    if(!any){ const e=document.createElement('div'); e.className='empty'; e.textContent='Sem campos editáveis.'; body.appendChild(e); }
  };
  const setOpen=open=>{ if(open) build(); body.style.display=open?'block':'none'; head.querySelector('.tw').textContent=open?'▾':'▸'; };
  head.querySelector('.nm').addEventListener('click', ()=>{ const willOpen=body.style.display==='none'; setOpen(willOpen); if(willOpen && node) node.scrollIntoView({behavior:'smooth', block:'center'}); });
  if(!col.fixedOrder){
    const up=head.querySelector('[data-a="up"]'), dn=head.querySelector('[data-a="dn"]'), hd=head.querySelector('[data-a="hide"]');
    up&&up.addEventListener('click', e=>{ e.stopPropagation(); moveItem(m,it,-1); });
    dn&&dn.addEventListener('click', e=>{ e.stopPropagation(); moveItem(m,it,1); });
    hd&&hd.addEventListener('click', e=>{ e.stopPropagation(); toggleItem(m,it); });
  }
  itemExpand[it.i]=()=>{ setOpen(true); };
  return b;
}

/* rola até o campo e foca (ao clicar no elemento correspondente do canvas) */
function focusField(key){
  const box=$('#insp');
  const mit=/^it\|(\d+)\|/.exec(key);
  if(mit && itemExpand[mit[1]]) itemExpand[mit[1]]();
  const target=box.querySelector('[data-field="'+cssEsc(key)+'"]');
  if(!target) return;
  target.scrollIntoView({block:'center'});
  const ed=target.querySelector('.insp-rich') || target.querySelector('.insp-url');
  if(ed) ed.focus();
}

/* ---------- reordenar / ocultar seções ---------- */
function moveSection(sec, dir){
  const arr=state.doc.sections; const i=arr.indexOf(sec); const j=i+dir;
  if(j<0||j>=arr.length) return;
  arr[i]=arr[j]; arr[j]=sec;
  applySectionOrder(); markDirty(); renderPanel();
}
function toggleSection(m){
  m.sec.v = m.sec.v===false ? true : false;
  markHidden(m.secEl, m.sec.v===false ? 'seção oculta — some ao publicar' : null);
  markDirty(); renderPanel();
}
/* ---------- reordenar / ocultar itens ---------- */
function moveItem(m, it, dir){
  const arr=m.sec.items; const i=arr.indexOf(it); const j=i+dir;
  if(j<0||j>=arr.length) return;
  arr[i]=arr[j]; arr[j]=it;
  applyItemOrder(m); markDirty(); renderInspector(m);
}
function toggleItem(m, it){
  it.v = it.v===false ? true : false;
  const node=m.itemNodes[it.i];
  markHidden(node, it.v===false ? 'item oculto — some ao publicar' : null);
  markDirty(); renderInspector(m);
}

/* ======================================================================
   RODAPÉ (editável em qualquer página, pelo inspetor)
====================================================================== */
function collectFooter(){
  state.footerFields=[];
  const footer=idoc().querySelector('footer'); if(!footer) return;
  const used=new Set();
  for(const [k,def] of Object.entries(FOOTER_TEXTS)){
    const saved=state.footer[k];
    const el=findFooterText(footer, [def, saved], used); if(!el) continue;
    if(saved && el.textContent.trim()!==saved) el.textContent=saved;  // reflete salvo
    state.footerFields.push({ key:k, label:FOOTER_TEXT_LABELS[k]||'Texto', el, set:v=>{ state.footer[k]=v; } });
  }
  for(const [k,def] of Object.entries(FOOTER_LINKS)){
    const cfg=(state.footer.links||{})[k]||{}; const saved=cfg.label;
    const a=findFooterLink(footer, [def, saved], used); if(!a) continue;
    if(saved && a.textContent.trim()!==saved) a.textContent=saved;  // reflete salvo
    state.footerFields.push({ key:k, label:'Link: '+def, el:a, set:v=>{ state.footer.links=state.footer.links||{}; state.footer.links[k]=Object.assign({}, state.footer.links[k], {label:v}); } });
  }
}
function selectFooter(opts){
  opts=opts||{};
  selFooter=true; selM=null; itemExpand={};
  markRowsActive(null);
  const d=idoc(); d.querySelectorAll('.cmsx-selsec').forEach(x=>x.classList.remove('cmsx-selsec'));
  const footer=d.querySelector('footer'); if(footer && opts.scroll!==false) footer.scrollIntoView({behavior:'smooth', block:'start'});
  const box=$('#insp'); box.innerHTML='';
  const h=document.createElement('div'); h.className='insp-title'; h.textContent='Rodapé'; box.appendChild(h);
  if(!state.footerFields.length){ const e=document.createElement('div'); e.className='empty'; e.textContent='Rodapé não encontrado nesta página.'; box.appendChild(e); return; }
  state.footerFields.forEach(f=>{
    const w=document.createElement('div'); w.className='fgroup'; w.dataset.field='ft-'+f.key;
    const l=document.createElement('div'); l.className='flabel'; l.textContent=f.label; w.appendChild(l);
    const r=document.createElement('div'); r.className='insp-rich'; r.contentEditable='true'; r.textContent=f.el.textContent.trim();
    r.addEventListener('input', ()=>{ const v=r.textContent.trim(); f.el.textContent=v; f.set(v); state.footerDirty=true; setDirtyUI(); });
    w.appendChild(r); box.appendChild(w);
  });
}
// folha de texto = sem filhos-elemento (exceto <br>, comum em blocos de endereço)
const isTextLeaf = el => ![...el.children].some(c=>c.tagName!=='BR');
function findFooterText(footer, cands, used){
  const els=footer.querySelectorAll('*');
  for(const el of els){
    if(used.has(el) || !isTextLeaf(el)) continue;
    const t=el.textContent.trim(); if(!t) continue;
    if(cands.some(c=>c && c.trim()===t)){ used.add(el); return el; }
  }
  return null;
}
function findFooterLink(footer, cands, used){
  for(const a of footer.querySelectorAll('a')){
    if(used.has(a)) continue;
    const t=a.textContent.trim(); if(!t) continue;
    if(cands.some(c=>c && c.trim()===t)){ used.add(a); return a; }
  }
  return null;
}

/* ======================================================================
   DIRTY / SALVAR / PUBLICAR
====================================================================== */
function markDirty(){ state.dirty=true; setDirtyUI(); }
function markClean(){ setDirtyUI(); }
function setDirtyUI(){
  const d=$('#dirty'), txt=$('#dirty-txt');
  if(state.dirty||state.footerDirty){ d.classList.remove('clean'); txt.textContent='Alterações não salvas'; }
  else{ d.classList.add('clean'); txt.textContent='Tudo salvo'; }
}

$('#btn-save').addEventListener('click', async ()=>{
  if(!auth.currentUser){ toast('Faça login para salvar.','err'); return; }
  if(!state.doc){ toast('Nada carregado ainda.','err'); return; }
  const b=$('#btn-save'); b.disabled=true; const orig=b.textContent; b.textContent='Salvando…';
  try{
    await db.collection('pages').doc(PAGE.doc).set(state.doc);
    if(state.footerDirty) await db.collection('settings').doc('global').set({footer:state.footer},{merge:true});
    state.dirty=false; state.footerDirty=false; setDirtyUI();
    toast('Salvo ✓  — clique em “Publicar no site” para o ar refletir.','ok');
  }catch(e){
    const perm=/permission|insufficient|PERMISSION/i.test(e.message);
    toast(perm?'Sem permissão para salvar (faça login com uma conta da equipe).':'Falha ao salvar: '+e.message,'err');
  }finally{ b.disabled=false; b.textContent=orig; }
});

$('#btn-publish').addEventListener('click', async ()=>{
  if(!auth.currentUser){ toast('Faça login para publicar.','err'); return; }
  if(state.dirty||state.footerDirty){ if(!confirm('Há alterações não salvas. Publicar vai usar o último Salvar. Continuar?')) return; }
  const b=$('#btn-publish'); b.disabled=true; const orig=b.textContent; b.textContent='Publicando…';
  try{
    const token=await auth.currentUser.getIdToken();
    const r=await fetch('/api/publish',{method:'POST',headers:{Authorization:'Bearer '+token}});
    if(!r.ok) throw new Error('falha');
    toast('Publicação iniciada ✓  — leva 1–2 min pra refletir no ar.','ok');
  }catch(e){ toast('Não foi possível publicar. Tente de novo; se persistir, avise o suporte.','err'); }
  finally{ b.disabled=false; b.textContent=orig; }
});

/* toggle desktop / mobile */
$('#vw-desk').addEventListener('click',()=>{ $('#shell').classList.remove('mobile'); $('#vw-desk').classList.add('on'); $('#vw-mob').classList.remove('on'); });
$('#vw-mob').addEventListener('click',()=>{ $('#shell').classList.add('mobile'); $('#vw-mob').classList.add('on'); $('#vw-desk').classList.remove('on'); });

/* aviso ao sair com alterações não salvas */
window.addEventListener('beforeunload', e=>{ if(state.dirty||state.footerDirty){ e.preventDefault(); e.returnValue=''; } });
</script>

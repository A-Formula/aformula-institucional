/* ---------- TOAST ---------- */
let toastT;
function toast(msg, kind){
  clearTimeout(toastT);
  let t=$('#toast'); if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.className='toast'+(kind?' '+kind:''); t.textContent=msg; t.style.display='block';
  toastT=setTimeout(()=>t.style.display='none', kind==='err'?5200:3200);
}

/* ---------- AUTH (idêntico ao painel) ---------- */
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault(); const m=$('#lg-msg'); m.className='msg'; m.textContent='Entrando…';
  try{ await auth.signInWithEmailAndPassword($('#lg-email').value.trim(), $('#lg-pass').value); }
  catch(err){ m.className='msg err'; m.textContent = err.code==='auth/invalid-credential'?'E-mail ou senha incorretos.':err.message; }
});
$('#logout').addEventListener('click', e=>{ e.preventDefault(); auth.signOut(); });

// Gate no cliente é só UX — o gate REAL é o servidor (verifyAdmin) + as regras do Firestore.
// NUNCA desloga por erro transitório (rede, refresh de token, signOut de outra aba):
// só desloga se a leitura teve SUCESSO e o doc de admin não existe (negação definitiva).
auth.onAuthStateChanged(async user=>{
  if(!user){ $('#login').classList.remove('hidden'); $('#app').classList.add('hidden'); return; }
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  boot();
  try{
    const s = await db.collection('admins').doc(user.email).get();
    if(!s.exists){
      $('#lg-msg').className='msg err'; $('#lg-msg').textContent='Este usuário não tem acesso ao editor.';
      $('#app').classList.add('hidden'); $('#login').classList.remove('hidden');
      await auth.signOut();
    }
  }catch(_){ /* erro transitório: mantém logado */ }
});

/* Upload de mídia (idêntico ao painel — Vercel Blob via /api/upload, gated por admin) */
async function uploadFile(file){
  if(!auth.currentUser) throw new Error('Faça login para enviar imagens.');
  if(file.size>4*1024*1024) throw new Error('Arquivo acima de 4 MB — reduza antes de enviar.');
  const token=await auth.currentUser.getIdToken();
  const r=await fetch('/api/upload?filename='+encodeURIComponent(file.name)+'&type='+encodeURIComponent(file.type||'application/octet-stream'),
    {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/octet-stream'},body:file});
  const j=await r.json().catch(()=>({}));
  if(!j.ok) throw new Error(j.error==='type'?'Formato não permitido (use imagem ou PDF).':'Falha no upload — tente de novo.');
  return j.url;
}

/* ======================================================================
   ESTADO GLOBAL DO EDITOR
====================================================================== */
const frame = $('#frame');
const idoc = () => frame.contentDocument;
let CONFIG = null;                // cms-config.json
let PAGE = null;                  // config da página atual { key,label,url,doc,anchor,collections }
const state = {
  doc: null,                      // pages/{doc} — mutado ao vivo
  footer: {},                     // settings/global.footer — mutado ao vivo
  dirty: false, footerDirty: false,
  model: [],                      // [{sec, secEl, col, itemNodes, mismatch}]
  secAnchor: null                 // nó de referência após a última seção (âncora de reordenação)
};

/* Config provisória (só o pet) caso cms-config.json ainda não exista */
const FALLBACK_CONFIG = { pages:[{
  key:'pet', label:'Página Pet', url:'/pet.html', doc:'pet', anchor:'data-dc-tpl',
  collections:{
    beneficios:{selector:'.pet-card[data-fade]'},
    formas:{selector:'[data-formas-track] > div'},
    sabores:{selector:'.pet-chip'},
    paraquem:{selector:'.pet-card.quem-card'},
    faq:{selector:'[data-faq-item]'}
  }
}]};

/* Rodapé — defaults (idênticos ao painel) */
const FOOTER_TEXTS = {

  copyright:'© A Fórmula 2026',

/* ======================================================================
   BOOT + TROCA DE PÁGINA
====================================================================== */
async function boot(){
  try{ CONFIG = await fetch('./cms-config.json',{cache:'no-store'}).then(r=>r.ok?r.json():Promise.reject()); }
  catch(e){ CONFIG = FALLBACK_CONFIG; }
  if(!CONFIG.pages || !CONFIG.pages.length) CONFIG = FALLBACK_CONFIG;
  const sel=$('#page-sel'); sel.innerHTML='';
  CONFIG.pages.forEach(p=>{ const o=document.createElement('option'); o.value=p.key; o.textContent=p.label; sel.appendChild(o); });
  sel.addEventListener('change',()=>{
    if((state.dirty||state.footerDirty) && !confirm('Há alterações não salvas. Trocar de página vai descartá-las?')){
      sel.value = PAGE.key; return;
    }
    loadPage(sel.value);
  });
  loadPage(CONFIG.pages[0].key);
}

async function loadPage(key){
  PAGE = CONFIG.pages.find(p=>p.key===key) || CONFIG.pages[0];
  state.doc=null; state.footer={}; state.dirty=false; state.footerDirty=false; state.model=[]; markClean();
  $('#loading').style.display='flex'; $('#loading').textContent='Carregando conteúdo…';
  // 1) carrega doc da página + rodapé global (leitura pública)
  try{
    const [pd, sg] = await Promise.all([
      db.collection('pages').doc(PAGE.doc).get(),
      db.collection('settings').doc('global').get()
    ]);
    state.doc = pd.exists ? pd.data() : {sections:[]};
    state.footer = (sg.data()||{}).footer || {};
  }catch(e){ state.doc={sections:[]}; state.footer={}; toast('Não consegui ler o conteúdo salvo: '+e.message,'err'); }
  // 2) aponta o iframe pra versão no ar
  $('#loading').textContent='Carregando página…';
  frame.addEventListener('load', onFrameLoad, {once:true});
  frame.src = PAGE.url + '?cmsx='+Date.now();  // cache-bust
}

function onFrameLoad(){
  try{ setupCanvas(); }
  catch(e){ console.error(e); toast('Erro ao preparar o editor: '+e.message,'err'); }
  $('#loading').style.display='none';
}

/* ======================================================================

/* ---------- helpers de mapeamento doc↔DOM ---------- */
const A = () => PAGE.anchor;
function secElByTpl(tpl){ return idoc().querySelector('['+A()+'="'+tpl+'"]'); }
function textEl(secEl, id){ return secEl.querySelector('['+A()+'="'+id+'"]'); }
function itemNodesOf(secEl, col){ return col && col.selector ? Array.from(secEl.querySelectorAll(col.selector)) : []; }
// imgs da seção = todas as <img> da seção EXCETO as que estão dentro de um item de coleção
function sectionImgs(secEl, itemNodes){
  return Array.from(secEl.querySelectorAll('img')).filter(im => !itemNodes.some(n=>n.contains(im)));
}
function tailTextNode(item){
  const w=idoc().createTreeWalker(item, NodeFilter.SHOW_TEXT, null);
  let last=null, n; while((n=w.nextNode())){ if(n.nodeValue && n.nodeValue.trim()) last=n; } return last;
}

function buildModel(){
  state.model = [];
  const cols = PAGE.collections||{};
  (state.doc.sections||[]).forEach(sec=>{
    const secEl = secElByTpl(sec.tpl);
    if(!secEl) return; // seção do doc não encontrada no DOM — ignora
    const col = cols[sec.key] || null;
    const itemNodes = itemNodesOf(secEl, col);
    const docItems = Array.isArray(sec.items)?sec.items:[];
    // conta esperada do DOM vs doc — mismatch bloqueia operações de item
    const mismatch = !!col && docItems.length>0 && itemNodes.length!==docItems.length;
    // tagueia itens com o índice original de documento (base da reordenação)
    itemNodes.forEach((n,i)=>{ n.dataset.cmsxI=i; });
    state.model.push({ sec, secEl, col, itemNodes, mismatch });
  });
  // âncora de reordenação de seção = nó logo após a última seção (geralmente o <footer>)
  if(state.model.length){
    const els = state.model.map(m=>m.secEl);
    const parent = els[0].parentNode;
    const inParent = els.filter(e=>e.parentNode===parent);
    const last = inParent[inParent.length-1];
    state.secAnchor = last ? last.nextSibling : null;
  }
}

/* ---------- aplica valores salvos sobre o DOM (reflete salvo-mas-não-publicado) ---------- */
function applyDocToDom(){
  state.model.forEach(m=>{
    const {sec, secEl, col, itemNodes, mismatch} = m;
    // textos de seção
    for(const [id,t] of Object.entries(sec.texts||{})){
      const el=textEl(secEl,id); if(el && typeof t.val==='string' && el.innerHTML!==t.val) el.innerHTML=t.val;
    }
    // imgs de seção
    const imgs=sectionImgs(secEl,itemNodes);
    for(const [idx,im] of Object.entries(sec.imgs||{})){
      const el=imgs[+idx]; if(el && im.val && el.getAttribute('src')!==im.val) el.src=im.val;
    }
    // itens
    if(col && !mismatch && Array.isArray(sec.items)){
      // conteúdo dos itens
      sec.items.forEach(it=>{
        const node=itemNodes[it.i]; if(!node) return;
        for(const [k,t] of Object.entries(it.texts||{})){
          const el=itemTextEl(node,k); if(el && typeof t.val==='string' && el.innerHTML!==t.val) el.innerHTML=t.val;
        }
        for(const [idx,im] of Object.entries(it.imgs||{})){
          const el=node.querySelectorAll('img')[+idx]; if(el && im.val && el.getAttribute('src')!==im.val) el.src=im.val;
        }
        if(it.tail && it.tail.val){ const tn=tailTextNode(node); if(tn && tn.nodeValue!==it.tail.val) tn.nodeValue=it.tail.val; }
      });
      // ordem + visibilidade dos itens
      applyItemOrder(m);
    }
  });
  // ordem + visibilidade das seções
  applySectionOrder();
  state.model.forEach(m=>{ if(m.sec.v===false) markHidden(m.secEl,'seção oculta — some ao publicar'); });
}

function itemTextEl(node,key){
  const dash=key.lastIndexOf('-'); const tag=key.slice(0,dash); const n=+key.slice(dash+1);
  const list=node.getElementsByTagName(tag); return list[n]||null;
}

function applySectionOrder(){
  if(!state.model.length) return;
  const els=state.model.map(m=>m.secEl);
  const parent=els[0].parentNode;
  if(!els.every(e=>e.parentNode===parent)) return; // parents diferentes — não arrisca
  state.doc.sections.forEach(sec=>{ const el=secElByTpl(sec.tpl); if(el&&el.parentNode===parent) parent.insertBefore(el, state.secAnchor); });
}

function applyItemOrder(m){
  const {sec,itemNodes}=m;
  if(!itemNodes.length) return;
  const parent=itemNodes[0].parentNode;
  if(!itemNodes.every(n=>n.parentNode===parent)) return;
  const anchor=itemNodes[itemNodes.length-1].nextSibling;
  sec.items.forEach(it=>{
    const node=itemNodes[it.i]; if(!node||node.parentNode!==parent) return;
    parent.insertBefore(node, anchor);
    markHidden(node, it.v===false ? 'item oculto — some ao publicar' : null);
  });
}

/* ---------- ocultar / reexibir (opacity .3 + tarja) ---------- */
function markHidden(el, label){
  const d=idoc();
  let tarja=el.querySelector(':scope > .cmsx-tarja');
  if(label){
    el.classList.add('cmsx-hiddenmark');
    if(!tarja){ tarja=d.createElement('div'); tarja.className='cmsx-tarja'; tarja.textContent=label; el.appendChild(tarja); }
  }else{
    el.classList.remove('cmsx-hiddenmark');
    if(tarja) tarja.remove();
  }
}

/* ======================================================================
   OVERLAYS: outline + tooltip + barras de seção/item + painel de imagem
====================================================================== */
let TIP, SECBAR, ITEMBAR, PANEL;
function ensureOverlayEls(){
  const d=idoc();
  TIP=d.createElement('div'); TIP.className='cmsx-tip'; TIP.style.display='none'; d.body.appendChild(TIP);
  SECBAR=d.createElement('div'); SECBAR.className='cmsx-bar'; SECBAR.style.display='none'; d.body.appendChild(SECBAR);
  ITEMBAR=d.createElement('div'); ITEMBAR.className='cmsx-bar item'; ITEMBAR.style.display='none'; d.body.appendChild(ITEMBAR);
  let hs,hi;
  SECBAR.addEventListener('mouseenter',()=>clearTimeout(hs));
  SECBAR.addEventListener('mouseleave',()=>{hs=setTimeout(()=>SECBAR.style.display='none',180);});
  ITEMBAR.addEventListener('mouseenter',()=>clearTimeout(hi));
  ITEMBAR.addEventListener('mouseleave',()=>{hi=setTimeout(()=>ITEMBAR.style.display='none',180);});
  SECBAR._hideSoon=()=>{hs=setTimeout(()=>SECBAR.style.display='none',180);};
  SECBAR._cancel=()=>clearTimeout(hs);
  ITEMBAR._hideSoon=()=>{hi=setTimeout(()=>ITEMBAR.style.display='none',180);};
  ITEMBAR._cancel=()=>clearTimeout(hi);
}
function hideBars(){ if(SECBAR)SECBAR.style.display='none'; if(ITEMBAR)ITEMBAR.style.display='none'; if(TIP)TIP.style.display='none'; }

function showTip(el, txt){
  const r=el.getBoundingClientRect();
  TIP.textContent=txt; TIP.style.display='block';
  TIP.style.left=Math.max(6,r.left)+'px';
  TIP.style.top=Math.max(6,r.top-26)+'px';
}
function hideTip(){ TIP.style.display='none'; }

// bottom de um header fixo/sticky do site (pra a barra não sumir atrás dele)
function stickyBottom(){
  const d=idoc(); const h=d.querySelector('header'); if(!h) return 0;
  const pos=frame.contentWindow.getComputedStyle(h).position;
  return (pos==='fixed'||pos==='sticky') ? h.getBoundingClientRect().bottom : 0;
}
function positionBar(bar, el, minTop){
  const r=el.getBoundingClientRect();
  bar.style.display='flex';
  const bw=bar.offsetWidth||240;
  bar.style.left=Math.min(Math.max(6,r.left), (idoc().documentElement.clientWidth-bw-6))+'px';
  bar.style.top=Math.max(minTop||6, r.top+6)+'px';
}

/* ---------- edição de TEXTO in-place ---------- */
function makeTextEditable(el, setVal){
  if(!el) return;
  el.addEventListener('mouseenter',()=>{ if(!el.isContentEditable){ el.classList.add('cmsx-hl'); showTip(el,'Clique para editar texto'); }});
  el.addEventListener('mouseleave',()=>{ el.classList.remove('cmsx-hl'); hideTip(); });
  el.addEventListener('click',e=>{
    e.preventDefault(); e.stopPropagation();
    if(el.isContentEditable) return;
    startTextEdit(el,setVal);
  });
}
function startTextEdit(el, setVal){
  hideTip(); el.classList.remove('cmsx-hl');
  const orig=el.innerHTML;
  el.contentEditable='true'; el.classList.add('cmsx-editing'); el.focus();
  // caret no fim
  try{ const rg=idoc().createRange(); rg.selectNodeContents(el); rg.collapse(false);
    const sel=frame.contentWindow.getSelection(); sel.removeAllRanges(); sel.addRange(rg); }catch(_){}
  const finish=(commit)=>{
    el.removeEventListener('keydown',onKey); el.removeEventListener('blur',onBlur);
    el.contentEditable='false'; el.classList.remove('cmsx-editing');
    if(commit){ if(el.innerHTML!==orig){ setVal(el.innerHTML); markDirty(); } }
    else el.innerHTML=orig;
  };
  const onKey=e=>{
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); el.blur(); }
    else if(e.key==='Escape'){ e.preventDefault(); finish(false); el.blur(); }
  };
  const onBlur=()=>finish(true);
  el.addEventListener('keydown',onKey); el.addEventListener('blur',onBlur);
}

/* ---------- edição de texto-folha (tail: chips de sabor) ---------- */
function makeTailEditable(node, tailObj){
  // edita o elemento do item; ao confirmar, lê o último nó de texto de volta pro doc
  node.addEventListener('mouseenter',()=>{ if(!node.isContentEditable){ node.classList.add('cmsx-hl'); showTip(node,'Clique para editar texto'); }});
  node.addEventListener('mouseleave',()=>{ node.classList.remove('cmsx-hl'); hideTip(); });
  node.addEventListener('click',e=>{
    if(node.isContentEditable) return;
    e.preventDefault(); e.stopPropagation();
    hideTip(); node.classList.remove('cmsx-hl');
    const orig=node.innerHTML;
    node.contentEditable='true'; node.classList.add('cmsx-editing'); node.focus();
    const finish=(commit)=>{
      node.removeEventListener('keydown',onKey); node.removeEventListener('blur',onBlur);
      node.contentEditable='false'; node.classList.remove('cmsx-editing');
      if(commit){ const tn=tailTextNode(node); const v=tn?tn.nodeValue:''; if(v!==tailObj.val){ tailObj.val=v; markDirty(); } }
      else node.innerHTML=orig;
    };
    const onKey=ev=>{ if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();node.blur();} else if(ev.key==='Escape'){ev.preventDefault();finish(false);node.blur();} };
    const onBlur=()=>finish(true);
    node.addEventListener('keydown',onKey); node.addEventListener('blur',onBlur);
  });
}

/* ---------- edição de IMAGEM (painel flutuante) ---------- */
function makeImgEditable(img, setSrc){
  if(!img) return;
  img.style.cursor='pointer';
  img.addEventListener('mouseenter',()=>{ img.classList.add('cmsx-hl'); showTip(img,'Clique para editar imagem'); });
  img.addEventListener('mouseleave',()=>{ img.classList.remove('cmsx-hl'); hideTip(); });
  img.addEventListener('click',e=>{ e.preventDefault(); e.stopPropagation(); openImgPanel(img,setSrc); });
}
function openImgPanel(img, setSrc){
  closePanel(); hideTip();
  const d=idoc();
  PANEL=d.createElement('div'); PANEL.className='cmsx-panel';
  PANEL.innerHTML=`<h4>Imagem <button title="Fechar">✕</button></h4>
    <img class="cmsx-prev" src="${esc(img.getAttribute('src')||'')}" alt="">
    <button class="cmsx-up" type="button">⬆ Enviar nova imagem</button>
    <input class="cmsx-url" value="${esc(img.getAttribute('src')||'')}" placeholder="ou cole uma URL de imagem">
    <button class="cmsx-apply" type="button">Aplicar URL</button>
    <div class="cmsx-msg"></div>`;
  d.body.appendChild(PANEL);
  // posiciona ao lado da imagem, dentro da viewport
  const r=img.getBoundingClientRect(); const vw=d.documentElement.clientWidth, vh=d.documentElement.clientHeight;
  let left=r.right+12; if(left+312>vw) left=Math.max(6,r.left-312);
  let top=Math.min(Math.max(6,r.top), vh-320);
  PANEL.style.left=left+'px'; PANEL.style.top=top+'px';
  const q=s=>PANEL.querySelector(s); const msg=q('.cmsx-msg');
  const apply=url=>{ img.src=url; q('.cmsx-prev').src=url; setSrc(url); markDirty(); };
  q('h4 button').addEventListener('click',closePanel);
  q('.cmsx-apply').addEventListener('click',()=>{ const u=q('.cmsx-url').value.trim(); if(u){ apply(u); msg.textContent='Aplicado ✓'; } });
  q('.cmsx-up').addEventListener('click',()=>{
    const fi=d.createElement('input'); fi.type='file'; fi.accept='image/*';
    fi.addEventListener('change',async()=>{
      const f=fi.files[0]; if(!f) return; msg.style.color='#5c7075'; msg.textContent='Enviando…';
      try{ const url=await uploadFile(f); apply(url); q('.cmsx-url').value=url; msg.style.color='#0a8f5b'; msg.textContent='Enviada e aplicada ✓'; }
      catch(err){ msg.style.color='#c0392b'; msg.textContent=err.message; }
    });
    fi.click();
  });
}
function closePanel(){ if(PANEL){ PANEL.remove(); PANEL=null; } }

/* ======================================================================
   CABEAMENTO DA EDIÇÃO (por seção / item / textos / imgs / barras)
====================================================================== */
function wireEditing(){
  const d=idoc();
  // fecha painel de imagem ao clicar fora dele
  d.addEventListener('mousedown',e=>{ if(PANEL && !PANEL.contains(e.target) && e.target.tagName!=='IMG') closePanel(); }, true);

  state.model.forEach((m,mi)=>{
    const {sec, secEl, col, itemNodes, mismatch} = m;

    // textos de seção
    for(const [id,t] of Object.entries(sec.texts||{}))
      makeTextEditable(textEl(secEl,id), v=>{ t.val=v; });
    // imgs de seção
    const imgs=sectionImgs(secEl,itemNodes);
    for(const [idx,im] of Object.entries(sec.imgs||{})){
      const el=imgs[+idx]; if(el) makeImgEditable(el, v=>{ im.val=v; });
    }

    // itens de coleção
    if(col && Array.isArray(sec.items) && sec.items.length){
      if(mismatch){
        // estrutura do DOM ≠ doc → edição segura: nada de item (só avisa na barra da seção)
      }else{
        sec.items.forEach(it=>{
          const node=itemNodes[it.i]; if(!node) return;
          for(const [k,t] of Object.entries(it.texts||{}))
            makeTextEditable(itemTextEl(node,k), v=>{ t.val=v; });
          for(const [idx,im] of Object.entries(it.imgs||{})){
            const el=node.querySelectorAll('img')[+idx]; if(el) makeImgEditable(el, v=>{ im.val=v; });
          }
          if(it.tail) makeTailEditable(node, it.tail);
          // barra do item (estrutural) — só se a coleção não for fixedOrder
          if(!col.fixedOrder){
            node.addEventListener('mouseenter',()=>showItemBar(m, it, node));
            node.addEventListener('mouseleave',()=>ITEMBAR._hideSoon());
          }
        });
      }
    }

    // barra da seção
    secEl.addEventListener('mouseenter',()=>showSecBar(m));
    secEl.addEventListener('mouseleave',()=>SECBAR._hideSoon());
  });
}

function showSecBar(m){
  SECBAR._cancel();
  const {sec, secEl, mismatch, col}=m;
  const idx=state.doc.sections.indexOf(sec);
  const first=idx<=0, last=idx>=state.doc.sections.length-1;
  const warn = mismatch ? `<span class="cmsx-lbl cmsx-warn" style="border-radius:6px;padding:3px 7px">⚠ estrutura mudou — itens travados</span>` : '';
  SECBAR.className='cmsx-bar';
  SECBAR.innerHTML=`<span class="cmsx-lbl">▤ ${esc(sec.label||sec.key)}</span>
    <button data-a="up" ${first?'disabled':''} title="Subir seção">↑</button>
    <button data-a="dn" ${last?'disabled':''} title="Descer seção">↓</button>
    <button data-a="hide" title="Ocultar/mostrar seção">${sec.v===false?'🚫':'👁'}</button>${warn}`;
  positionBar(SECBAR, secEl, stickyBottom()+4);
  SECBAR.querySelector('[data-a="up"]').onclick=()=>moveSection(sec,-1);
  SECBAR.querySelector('[data-a="dn"]').onclick=()=>moveSection(sec,1);
  SECBAR.querySelector('[data-a="hide"]').onclick=()=>toggleSection(m);
}
function moveSection(sec, dir){
  const arr=state.doc.sections; const i=arr.indexOf(sec); const j=i+dir;
  if(j<0||j>=arr.length) return;
  arr[i]=arr[j]; arr[j]=sec;
  applySectionOrder(); markDirty(); hideBars();
}
function toggleSection(m){
  m.sec.v = m.sec.v===false ? true : false;
  markHidden(m.secEl, m.sec.v===false ? 'seção oculta — some ao publicar' : null);
  markDirty(); hideBars();
}

function showItemBar(m, it, node){
  ITEMBAR._cancel();
  const arr=m.sec.items; const idx=arr.indexOf(it);
  const first=idx<=0, last=idx>=arr.length-1;
  ITEMBAR.innerHTML=`<span class="cmsx-lbl">${esc((it.name||'Item').replace(/<[^>]*>/g,'').slice(0,40))}</span>
    <button data-a="up" ${first?'disabled':''} title="Subir">↑</button>
    <button data-a="dn" ${last?'disabled':''} title="Descer">↓</button>
    <button data-a="hide" title="Ocultar/mostrar">${it.v===false?'🚫':'👁'}</button>`;
  positionBar(ITEMBAR, node);
  ITEMBAR.querySelector('[data-a="up"]').onclick=()=>moveItem(m,it,-1);
  ITEMBAR.querySelector('[data-a="dn"]').onclick=()=>moveItem(m,it,1);
  ITEMBAR.querySelector('[data-a="hide"]').onclick=()=>toggleItem(m,it);
}
function moveItem(m, it, dir){
  const arr=m.sec.items; const i=arr.indexOf(it); const j=i+dir;
  if(j<0||j>=arr.length) return;
  arr[i]=arr[j]; arr[j]=it;
  applyItemOrder(m); markDirty(); hideBars();
}
function toggleItem(m, it){
  it.v = it.v===false ? true : false;
  const node=m.itemNodes[it.i];
  markHidden(node, it.v===false ? 'item oculto — some ao publicar' : null);
  markDirty(); hideBars();
}

/* ======================================================================
   RODAPÉ (editável em qualquer página)
====================================================================== */
function wireFooter(){
  const footer=idoc().querySelector('footer'); if(!footer) return;
  const used=new Set();
  // textos: casa por textContent com default OU valor salvo
  for(const [k,def] of Object.entries(FOOTER_TEXTS)){
    const saved=state.footer[k];
    const el=findFooterText(footer, [def, saved], used);
    if(!el) continue;
    if(saved && el.textContent.trim()!==saved) el.textContent=saved;  // reflete salvo
    makeTextEditable(el, v=>{ state.footer[k]=el.textContent.trim(); state.footerDirty=true; });
  }
  // links: casa <a> por label default OU salvo
  for(const [k,def] of Object.entries(FOOTER_LINKS)){
    const cfg=(state.footer.links||{})[k]||{};
    const saved=cfg.label;
    const a=findFooterLink(footer, [def, saved], used);
    if(!a) continue;
    if(saved && a.textContent.trim()!==saved) a.textContent=saved;  // reflete salvo
    makeTextEditable(a, v=>{
      state.footer.links=state.footer.links||{};
      state.footer.links[k]=Object.assign({}, state.footer.links[k], {label:a.textContent.trim()});
      state.footerDirty=true;
    });
  }
}
// folha de texto = sem filhos-elemento (exceto <br>, comum em blocos de endereço)
const isTextLeaf = el => ![...el.children].some(c=>c.tagName!=='BR');
function findFooterText(footer, cands, used){
  const els=footer.querySelectorAll('*');
  for(const el of els){
    if(used.has(el) || !isTextLeaf(el)) continue;
    const t=el.textContent.trim(); if(!t) continue;
    if(cands.some(c=>c && c.trim()===t)){ used.add(el); return el; }
  }
  return null;
}
function findFooterLink(footer, cands, used){
  for(const a of footer.querySelectorAll('a')){
    if(used.has(a)) continue;
    const t=a.textContent.trim(); if(!t) continue;
    if(cands.some(c=>c && c.trim()===t)){ used.add(a); return a; }
  }
  return null;
}

/* ======================================================================
   DIRTY / SALVAR / PUBLICAR
====================================================================== */
function markDirty(){ state.dirty=true; setDirtyUI(); }
function markClean(){ setDirtyUI(); }
function setDirtyUI(){
  const d=$('#dirty'), txt=$('#dirty-txt');
  if(state.dirty||state.footerDirty){ d.classList.remove('clean'); txt.textContent='Alterações não salvas'; }
  else{ d.classList.add('clean'); txt.textContent='Tudo salvo'; }
}

$('#btn-save').addEventListener('click', async ()=>{
  if(!auth.currentUser){ toast('Faça login para salvar.','err'); return; }
  if(!state.doc){ toast('Nada carregado ainda.','err'); return; }
  const b=$('#btn-save'); b.disabled=true; const orig=b.textContent; b.textContent='Salvando…';
  try{
    await db.collection('pages').doc(PAGE.doc).set(state.doc);
    if(state.footerDirty) await db.collection('settings').doc('global').set({footer:state.footer},{merge:true});
    state.dirty=false; state.footerDirty=false; setDirtyUI();
    toast('Salvo ✓  — clique em “Publicar no site” para o ar refletir.','ok');
  }catch(e){
    const perm=/permission|insufficient|PERMISSION/i.test(e.message);
    toast(perm?'Sem permissão para salvar (faça login com uma conta da equipe).':'Falha ao salvar: '+e.message,'err');
  }finally{ b.disabled=false; b.textContent=orig; }
});

$('#btn-publish').addEventListener('click', async ()=>{
  if(!auth.currentUser){ toast('Faça login para publicar.','err'); return; }
  if(state.dirty||state.footerDirty){ if(!confirm('Há alterações não salvas. Publicar vai usar o último Salvar. Continuar?')) return; }
  const b=$('#btn-publish'); b.disabled=true; const orig=b.textContent; b.textContent='Publicando…';
  try{
    const token=await auth.currentUser.getIdToken();
    const r=await fetch('/api/publish',{method:'POST',headers:{Authorization:'Bearer '+token}});
    if(!r.ok) throw new Error('falha');
    toast('Publicação iniciada ✓  — leva 1–2 min pra refletir no ar.','ok');
  }catch(e){ toast('Não foi possível publicar. Tente de novo; se persistir, avise o suporte.','err'); }
  finally{ b.disabled=false; b.textContent=orig; }
});

/* toggle desktop / mobile */
$('#vw-desk').addEventListener('click',()=>{ $('#shell').classList.remove('mobile'); $('#vw-desk').classList.add('on'); $('#vw-mob').classList.remove('on'); });
$('#vw-mob').addEventListener('click',()=>{ $('#shell').classList.add('mobile'); $('#vw-mob').classList.add('on'); $('#vw-desk').classList.remove('on'); });

/* aviso ao sair com alterações não salvas */
window.addEventListener('beforeunload', e=>{ if(state.dirty||state.footerDirty){ e.preventDefault(); e.returnValue=''; } });
</script>
